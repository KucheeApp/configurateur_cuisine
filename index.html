<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Générateur de Cuisine 2D</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Courier New', monospace;
      margin: 0; padding: 0;
      background: #ffffff; color: #222;
      min-height: 100vh;
    }
    #root { display: flex; flex-direction: column; height: 100vh; }
    input[type=range] { accent-color: #444; }
    input[type=number] {
      width: 100%; background: #f7f7f7;
      border: 1px solid #ccc; color: #222;
      padding: 3px 6px; font-size: 10px;
      font-family: 'Courier New', monospace;
    }
    input[type=number]:focus { outline: 1px solid #333; }
  </style>
  <!-- Pré-chargement des scripts critiques -->
  <link rel="preload" href="https://unpkg.com/react@18/umd/react.production.min.js" as="script" crossorigin>
  <link rel="preload" href="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" as="script" crossorigin>
  <link rel="preload" href="https://unpkg.com/@babel/standalone/babel.min.js" as="script" crossorigin>
  <!-- Chargement différé -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>
  <!-- Loader -->
  <div id="loader" style="position:fixed;top:0;left:0;width:100%;height:100%;background:white;display:flex;justify-content:center;align-items:center;font-family:'Courier New',monospace;font-size:13px;color:#888;letter-spacing:3px;">
    CHARGEMENT…
  </div>
  <div id="root"></div>
  <script>
    window.addEventListener('load', () => {
      const l = document.getElementById('loader');
      if (l) l.style.display = 'none';
    });
  </script>
  <script type="text/babel">

    // ====== EMAILJS CONFIG — à remplir avec vos identifiants emailjs.com ======
    const EMAILJS_CONFIG = {
      PUBLIC_KEY:      'VOTRE_PUBLIC_KEY',      // Account > API Keys
      SERVICE_ID:      'VOTRE_SERVICE_ID',      // Email Services
      TEMPLATE_CLIENT: 'VOTRE_TEMPLATE_CLIENT', // Template envoyé au client
      TEMPLATE_NOTIF:  'VOTRE_TEMPLATE_NOTIF',  // Template notification pour vous
      VOTRE_EMAIL:     'votre@email.com',       // Votre adresse de réception leads
    };

    // ====== CONSTANTES ======
    const C = {
      LOWER_H: 85, COUNTER_H: 4, UPPER_H: 72,
      COL_H: 215, COL_W: 60, UPPER_FROM: 143,
      VIEW_H: 230, MARGIN: 22,
    };
    const svgY      = (cm) => C.VIEW_H - cm + C.MARGIN;
    const FLOOR_Y   = svgY(0);
    const COL_TOP_Y = svgY(C.COL_H);

    // ====== DONNÉES ======
    const LOWER_TYPES = [
      { id: 'rangement',   label: 'Rangement (portes)',  widths: null,     noColFour: false },
      { id: 'tiroirs',     label: 'Tiroirs',              widths: null,     noColFour: false },
      { id: 'evier',       label: 'Sous évier',           widths: null,     noColFour: false, unique: true },
      { id: 'lv',          label: 'Lave-vaisselle',       widths: [45, 60], noColFour: false, unique: true },
      { id: 'four',        label: 'Four encastré',        widths: [60],     noColFour: true  },
    ];
    const UPPER_TYPES = [
      { id: 'rangement', label: 'Rangement fermé'   },
      { id: 'etageres',  label: 'Étagères ouvertes' },
      { id: 'mixte',     label: 'Porte + étagères'  },
      { id: 'vide',      label: 'Espace vide'       },
      { id: 'micro',     label: 'Micro-onde'        },
    ];
    const COL_TYPES = [
      { id: 'colonne',     label: 'Colonne rangement'      },
      { id: 'frigo',       label: 'Réfrigérateur'          },
      { id: 'four',        label: 'Colonne four'            },
      { id: 'frigo_libre', label: 'Frigo pose libre'       },
    ];

    // ====== UTILITAIRES ======
    const getColPositions = (wl, cfg) => {
      if (cfg === 'none') return [];
      if (cfg === 'A') return [0, wl - C.COL_W];
      if (cfg === 'B') return [wl - C.COL_W * 2, wl - C.COL_W];
      if (cfg === 'C') return [0, C.COL_W];
      if (cfg === 'D') return [0];
      if (cfg === 'E') return [wl - C.COL_W];
      return [];
    };
    const getCabRange = (wl, cfg) => {
      if (cfg === 'A') return [C.COL_W, wl - C.COL_W];
      if (cfg === 'B') return [0, wl - C.COL_W * 2];
      if (cfg === 'C') return [C.COL_W * 2, wl];
      if (cfg === 'D') return [C.COL_W, wl];
      if (cfg === 'E') return [0, wl - C.COL_W];
      return [0, wl];
    };
    const STD_WIDTHS = [45, 60, 90];
    const isStdWidth = (w) => STD_WIDTHS.includes(w);

    const genCabs = (wl, cfg) => {
      const [s, e] = getCabRange(wl, cfg);
      if (e - s <= 0) return [];
      const cabs = []; let x = s, id = 0;
      while (x < e) {
        const rem = e - x;
        // Si c'est le dernier meuble, il prend exactement l'espace restant
        const isLast = rem < 60 || (rem >= 60 && rem % 60 !== 0 && rem - 60 < 15);
        const rawW = isLast ? rem : 60;
        const w = Math.min(rawW, 90);
        cabs.push({ id: id++, x, w, lowerType: 'rangement', upperMode: 'upper', upperType: 'rangement', hoodW: 60, hasPlaque: false });
        x += w;
      }
      return cabs;
    };
    const repackCabs = (cabs, start, extraColsObs=[]) => {
      // Trier les obstacles (colonnes extra) par position
      const obs = [...extraColsObs].sort((a,b) => a.x - b.x);
      let x = start;
      return cabs.map(c => {
        // Sauter par-dessus les colonnes extra qui se trouvent dans notre chemin
        let placed = false;
        while (!placed) {
          const blocking = obs.find(o => x >= o.x && x < o.x + o.w);
          if (blocking) {
            x = blocking.x + blocking.w;
          } else {
            placed = true;
          }
        }
        const nc = { ...c, x };
        x += c.w;
        return nc;
      });
    };
    const hasWinOverlap = (cab, wins) => wins.some(w => cab.x < w.pos + w.w && cab.x + cab.w > w.pos);

    // Découpe tout meuble > 90cm en tranches de 60/90cm
    const splitOversized = (cabs) => {
      const out = [];
      let nextId = Date.now();
      for (const c of cabs) {
        if (c.w <= 90) { out.push(c); continue; }
        let rem = c.w;
        let first = true;
        while (rem > 0) {
          const slice = rem > 90 ? (rem % 90 === 0 ? 90 : rem - Math.floor(rem/90)*90 >= 15 ? 90 : 60) : rem;
          out.push({...c, id: first ? c.id : nextId++, w: slice, lowerType:'rangement'});
          rem -= slice;
          first = false;
        }
      }
      return out;
    };
    const fixLowerType = (type, w, hasColFour, cabs, selfId) => {
      const t = LOWER_TYPES.find(t => t.id === type);
      if (!t) return 'rangement';
      if (t.widths && !t.widths.includes(w)) return 'rangement';
      if (t.noColFour && hasColFour) return 'rangement';
      if (t.unique && cabs.some(c => c.id !== selfId && c.lowerType === type)) return 'rangement';
      return type;
    };

    // ====== GRILLE TARIFAIRE ======
    const PRICING = {
      lower: {
        rangement:   { 45:190, 60:230, 90:300 },
        tiroirs:     { 45:260, 60:310, 90:390 },
        evier:       { 45:150, 60:180, 90:220 },
        lv:          { 45:90,  60:90  },
        four:        { 60:130 },
      },
      upper: {
        rangement: { 45:160, 60:195, 90:240 },
        etageres:  { 45:120, 60:145, 90:180 },
        mixte:     { 45:150, 60:180, 90:225 },
        vide:      { 45:0,   60:0,   90:0   },
        micro:     { 60:210 },
      },
      hood:   { 60:180, 90:220 },
      col: {
        colonne:     380,
        frigo:       300,
        four:        420,
        frigo_libre: 220,
      },
      worktop: { low: 85, high: 220 },
    };

    const priceLookup = (table, w) => {
      if (!table) return 0;
      if (table[w] !== undefined) return table[w];
      const keys = Object.keys(table).map(Number).sort((a,b)=>a-b);
      if (!keys.length) return 0;
      return Math.round(table[keys[0]] * w / keys[0]);
    };

    const calcPrice = ({ cabs, colCfg, colTypes, extraCols, wallLen }) => {
      let lower = 0, upper = 0, cols = 0;
      cabs.forEach(function(c) {
        const lTable = PRICING.lower[c.lowerType] || PRICING.lower.rangement;
        lower += priceLookup(lTable, c.w);
        if (c.upperMode === 'upper') {
          const uTable = PRICING.upper[c.upperType] || PRICING.upper.rangement;
          upper += priceLookup(uTable, c.w);
        } else if (c.upperMode === 'hood') {
          upper += priceLookup(PRICING.hood, c.hoodW || 60);
        }
      });
      getColPositions(wallLen, colCfg).forEach(function(_, i) {
        const ct = (colTypes && colTypes[i]) || 'colonne';
        cols += PRICING.col[ct] || PRICING.col.colonne;
      });
      extraCols.forEach(function(ec) {
        cols += PRICING.col[ec.colType] || PRICING.col.colonne;
      });
      const totalLowerW = cabs.reduce((s, c) => s + c.w, 0) / 100;
      const worktopLow  = Math.round(totalLowerW * PRICING.worktop.low);
      const worktopHigh = Math.round(totalLowerW * PRICING.worktop.high);
      const subtotal = lower + upper + cols;
      return { lower, upper, cols, worktopLow, worktopHigh,
               totalLow: subtotal + worktopLow, totalHigh: subtotal + worktopHigh };
    };

    const fmt = function(n) { return n.toLocaleString('fr-FR') + ' €'; };

    // ====== COMPOSANTS SVG ======

    const Casserole = ({ cx, ctY, cw }) => {
      const imgW = Math.min(cw * 0.85, cw - 4);
      const imgH = imgW * (429 / 2441);
      const imgX = cx - imgW / 2;
      const imgY = ctY - imgH;
      const href = "images/casserole.svg";
      return <image href={href} x={imgX} y={imgY} width={imgW} height={imgH}
        preserveAspectRatio="xMidYMid meet" />;
    };;

    const ColSvg = React.memo(({ xPos, doorStyle, idx, isLeft, colType, onClick, selected }) => {
      const x = xPos + C.MARGIN, y = COL_TOP_Y, w = C.COL_W, h = C.COL_H;
      const type = colType || 'colonne';
      const clipId = `colclip${idx}`;
      return (
        <g onClick={onClick} style={{ cursor: 'pointer' }}>
          <defs><clipPath id={clipId}><rect x={x} y={y} width={w} height={h} /></clipPath></defs>
          <rect x={x} y={y} width={w} height={h}
            fill={type==='frigo' ? '#ddeeff' : type==='four' ? '#f0ece0' : type==='frigo_libre' ? '#ddeeff' : '#e8e8e8'}
            stroke={selected ? '#1a56cc' : '#333'} strokeWidth={selected ? 2 : 1.5} />
          {type === 'colonne' && (() => {
            const href = "images/colonne.svg";
            return <image href={href} x={x} y={y} width={w} height={h}
              preserveAspectRatio="none" clipPath={`url(#${clipId})`} />;
          })()}
          {type === 'frigo' && (() => {
            const href = "images/frigo.svg";
            return <image href={href} x={x} y={y} width={w} height={h}
              preserveAspectRatio="none" clipPath={`url(#${clipId})`} />;
          })()}
          {type === 'four' && (() => {
            // SVG colonne four — étirement plein cadre
            const fW   = w;
            const fH   = h;
            const fX   = x;
            const fY   = y;
            const href = "images/four_colonne.svg";
            return <image href={href} x={fX} y={fY} width={fW} height={fH} clipPath={`url(#${clipId})`} preserveAspectRatio="none" />;
          })()}
          {type === 'frigo_libre' && (() => {
            const href = "images/frigo_libre.svg";
            return <image href={href} x={x} y={y} width={w} height={h}
              preserveAspectRatio="none" clipPath={`url(#${clipId})`} />;
          })()}
          {doorStyle==='frame' && type==='colonne' &&
            <rect x={x+5} y={y+5} width={w-10} height={h-10} fill="none" stroke="#888" strokeWidth={0.7} />}
          {isLeft
            ? <text x={x+w/2} y={y+h-10} textAnchor="middle" fontSize={8} fill="#888">←</text>
            : <text x={x+w/2} y={y+h-10} textAnchor="middle" fontSize={8} fill="#888">→</text>}
        </g>
      );
    });

    const WinSvg = ({ win, onDragStart, isDragging }) => {
      const x = win.pos + C.MARGIN;
      const yT = svgY(190), yB = svgY(93), h = yB - yT;
      return (
        <g onMouseDown={e => { e.preventDefault(); onDragStart(win.id, win.pos, e); }}
           onTouchStart={e => { e.preventDefault(); onDragStart(win.id, win.pos, e.touches[0]); }}
           style={{ cursor: isDragging ? 'grabbing' : 'grab' }}>
          <rect x={x} y={yT} width={win.w} height={h}
            fill={isDragging ? '#bbddff' : '#d6eaff'}
            stroke={isDragging ? '#3366cc' : '#7a9acc'} strokeWidth={isDragging ? 1.5 : 0.8} />
          <line x1={x} y1={yT+h/2} x2={x+win.w} y2={yT+h/2} stroke="#9ab" strokeWidth={0.5} />
          <line x1={x+win.w/2} y1={yT} x2={x+win.w/2} y2={yB} stroke="#9ab" strokeWidth={0.5} />
          <text x={x+8} y={yT+h/2+2} textAnchor="middle" fontSize={7} fill="#3366cc">◁</text>
          <text x={x+win.w-8} y={yT+h/2+2} textAnchor="middle" fontSize={7} fill="#3366cc">▷</text>
          <text x={x+win.w/2} y={yT-3} textAnchor="middle" fontSize={7} fill="#3366cc" fontFamily="Courier New, monospace">⊞ {win.w}cm · pos:{win.pos}cm</text>
        </g>
      );
    };

    const LowerSvg = ({ cab, selected, onSelect, doorStyle }) => {
      const x = cab.x + C.MARGIN, y = svgY(C.LOWER_H);
      const cw = cab.w, h = C.LOWER_H, fi = 5;
      const isInvalid = cw < 30;
      const ctY = svgY(C.LOWER_H + C.COUNTER_H);
      const cx  = x + cw / 2;
      return (
        <g onClick={e => { e.stopPropagation(); onSelect(e); }} style={{ cursor: 'pointer' }}>
          <rect x={x} y={y} width={cw} height={h}
            fill={isInvalid ? '#fff0ee' : selected ? '#eef3ff' : 'white'}
            stroke={isInvalid ? '#cc3333' : selected ? '#1a56cc' : '#333'}
            strokeWidth={selected ? 2 : 1} />
          {doorStyle==='frame' && !isInvalid && !['four_plaque','lv','four','evier','rangement'].includes(cab.lowerType) &&
            <rect x={x+fi} y={y+fi} width={cw-fi*2} height={h-fi*2} fill="none" stroke="#777" strokeWidth={0.65} />}
          {(cab.lowerType==='rangement' || cab.lowerType===undefined || cab.lowerType==='') && cw <= 60 && (() => {
            const href = "images/rangement_45.svg";
            return <image href={href} x={x} y={y} width={cw} height={h} preserveAspectRatio="none" />;
          })()}
          {(cab.lowerType==='rangement' || cab.lowerType===undefined || cab.lowerType==='') && cw > 60 && (() => {
            const href = "images/rangement_60.svg";
            return <image href={href} x={x} y={y} width={cw} height={h} preserveAspectRatio="none" />;
          })()}
          {cab.lowerType==='tiroirs' && (() => {
            const href = "images/tiroirs.svg";
            return <image href={href} x={x} y={y} width={cw} height={h} preserveAspectRatio="none" />;
          })()}
          {cab.lowerType==='evier' && (() => {
            const href = cw > 60
              ? "images/evier_60.svg"
              : "images/evier_45.svg";
            return <image href={href} x={x} y={y} width={cw} height={h} preserveAspectRatio="none" />;
          })()}
          {cab.lowerType==='evier' && (() => {
            // MITIGEUR — SVG importé, centré sur cx, ancré sur le plan de travail
            const mH  = 35;                         // hauteur affichée (unités SVG)
            const mW  = mH * 659 / 1590;            // largeur proportionnelle ≈ 14.5
            const mX  = cx - mW / 2;
            const mY  = ctY - mH + 2;               // bas collé au plan de travail
            const href = "images/mitigeur.svg";
            return (
              <image href={href} x={mX} y={mY} width={mW} height={mH} />
            );
          })()}
          {cab.lowerType==='lv' && (() => {
            // LAVE-VAISSELLE — SVG importé, plein cadre
            const href = "images/lv.svg";
            return (
              <image href={href} x={x} y={y} width={cw} height={h}
                preserveAspectRatio="none" />
            );
          })()}
          {cab.lowerType==='four' && (() => {
            const href = "images/four.svg";
            return (
              <image href={href} x={x} y={y} width={cw} height={h}
                preserveAspectRatio="none" />
            );
          })()}
          {cab.lowerType==='four_plaque' && (() => {
            const px=x+4, pw=cw-8, oY=y+6, oH=h-12;
            return (<>
              <rect x={px} y={oY} width={pw} height={oH} fill="#f2f2f2" stroke="#666" strokeWidth={0.7} />
              <rect x={px+3} y={oY+3} width={pw-6} height={oH-6} fill="none" stroke="#bbb" strokeWidth={0.4} />
              <text x={cx} y={oY+oH/2+2.5} textAnchor="middle" fontSize={5.5} fill="#555" fontFamily="monospace">FOUR</text>
              <Casserole cx={cx} ctY={ctY} cw={cw} />
            </>);
          })()}
          <text x={cx} y={y+h-4} textAnchor="middle" fontSize={6} fill="#999" fontFamily="Courier New, monospace">{cw}cm</text>
          <rect x={x} y={ctY} width={cw} height={C.COUNTER_H} fill="#222" stroke="#111" strokeWidth={0.4} />
          {cab.hasPlaque && <Casserole cx={cx} ctY={ctY} cw={cw} />}
        </g>
      );
    };

    const UpperSvg = ({ cab, doorStyle, wins, selected, onSelect }) => {
      const { x, w: cw, upperMode, upperType, hoodW } = cab;
      const xPos = x + C.MARGIN;
      const y = svgY(C.UPPER_FROM + C.UPPER_H), h = C.UPPER_H, fi = 4;
      const selStroke = selected ? '#1a56cc' : '#333';
      const selWidth  = selected ? 2 : 1;

      if (hasWinOverlap(cab, wins)) return (
        <g onClick={e => { e.stopPropagation(); onSelect(); }} style={{ cursor: 'pointer' }}>
          <rect x={xPos} y={y} width={cw} height={h} fill="none" stroke="#ccc" strokeWidth={0.4} strokeDasharray="2,3" />
          <text x={xPos+cw/2} y={y+h/2+2} textAnchor="middle" fontSize={5.5} fill="#aaa" fontFamily="monospace">⊞</text>
        </g>
      );
      if (upperMode==='none') return (
        <g onClick={e => { e.stopPropagation(); onSelect(); }} style={{ cursor: 'pointer' }}>
          <rect x={xPos} y={y} width={cw} height={h}
            fill={selected ? '#eef3ff' : '#fafafa'}
            stroke={selected ? '#1a56cc' : '#ccc'}
            strokeWidth={selected ? 1.5 : 0.6} strokeDasharray="3,2" />
          <text x={xPos+cw/2} y={y+h/2+2} textAnchor="middle" fontSize={8} fill={selected ? '#1a56cc' : '#bbb'} fontFamily="monospace">∅</text>
        </g>
      );
      if (upperMode==='hood') {
        if (cw < 60) return (
          <g onClick={e => { e.stopPropagation(); onSelect(); }} style={{ cursor: 'pointer' }}>
            <rect x={xPos} y={y} width={cw} height={h} fill="#fafafa" stroke="#ccc" strokeWidth={0.6} strokeDasharray="3,2" />
            <text x={xPos+cw/2} y={y+h/2+2} textAnchor="middle" fontSize={8} fill="#bbb" fontFamily="monospace">∅</text>
          </g>
        );
        const yTop    = svgY(C.UPPER_FROM + C.UPPER_H);
        const yBot    = svgY(C.UPPER_FROM);
        const totalH  = yBot - yTop;
        // Image hotte : largeur = cw, hauteur proportionnelle (ratio 1087/964)
        const iW  = cw;
        const iH  = iW / (1102/951);
        const iX  = xPos;
        const iY  = yBot - iH;   // ancrée en bas
        const href = "images/capot.svg";
        return (
          <g onClick={e => { e.stopPropagation(); onSelect(); }} style={{ cursor: 'pointer' }}>
            {/* Fond meuble pleine hauteur */}
            <rect x={xPos} y={yTop} width={cw} height={totalH}
              fill={selected ? '#eef3ff' : 'white'}
              stroke={selected ? '#1a56cc' : 'none'}
              strokeWidth={selected ? 1.5 : 0} />
            {/* Hotte SVG */}
            <image href={href} x={iX} y={iY} width={iW} height={iH} />
          </g>
        );
      }
      return (
        <g onClick={e => { e.stopPropagation(); onSelect(); }} style={{ cursor: 'pointer' }}>
          <rect x={xPos} y={y} width={cw} height={h}
            fill={selected ? '#eef3ff' : 'white'}
            stroke={selStroke} strokeWidth={selWidth} />
          {doorStyle==='frame' && <rect x={xPos+fi} y={y+fi} width={cw-fi*2} height={h-fi*2} fill="none" stroke="#777" strokeWidth={0.65} />}
          {upperType==='etageres' && [1,2].map(i =>
            <line key={i} x1={xPos+2} y1={y+h*i/3} x2={xPos+cw-2} y2={y+h*i/3} stroke="#bbb" strokeWidth={0.55} />)}
          {upperType==='mixte' && [0.5,0.75].map((r,i) =>
            <line key={i} x1={xPos+2} y1={y+h*r} x2={xPos+cw-2} y2={y+h*r} stroke="#bbb" strokeWidth={0.55} />)}
          {upperType==='vide' && <>
            <line x1={xPos+3} y1={y+3} x2={xPos+cw-3} y2={y+h-3} stroke="#ddd" strokeWidth={0.5} />
            <line x1={xPos+cw-3} y1={y+3} x2={xPos+3} y2={y+h-3} stroke="#ddd" strokeWidth={0.5} />
          </>}
          {upperType==='micro' && (() => {
            // MEUBLE HAUT MICRO-ONDE
            // Partie haute : rangement fermé (~45% hauteur)
            const topH  = h * 0.45;
            const topY  = y;
            // Micro-onde : partie basse (~55% hauteur)
            const moY   = y + topH;
            const moH   = h - topH;
            const mx    = xPos + 2, mw = cw - 4;
            // Séparation gauche (grille) / droite (commandes) : 65% / 35%
            const grW   = mw * 0.62, ctW = mw * 0.38;
            const grX   = mx, ctX = mx + grW;
            const nbLines = 9;
            // Commandes droite
            const dispW = ctW - 4, dispH = moH * 0.22;
            const dispX = ctX + 2, dispY = moY + 3;
            // 6 boutons (2 col × 3 rangées)
            const btnS  = Math.min((ctW - 8) / 2 - 1, (moH * 0.45) / 3 - 1);
            const btnX1 = ctX + 2, btnX2 = ctX + 2 + btnS + 2;
            const btnY0 = dispY + dispH + 3;
            // Bouton rectangulaire bas
            const longBtnY = btnY0 + 3 * (btnS + 2);
            return (<>
              {/* Séparateur rangement / micro */}
              <line x1={xPos+1} y1={moY} x2={xPos+cw-1} y2={moY} stroke="#555" strokeWidth={0.8}/>
              {/* Cadre micro-onde */}
              <rect x={mx} y={moY+1} width={mw} height={moH-2}
                fill="#f8f8f8" stroke="#333" strokeWidth={0.7}/>
              {/* Grille aération gauche */}
              {Array.from({length:nbLines},(_,i) => (
                <line key={i}
                  x1={grX+2} y1={moY + 3 + (moH-6)*(i+0.5)/nbLines}
                  x2={grX+grW-2} y2={moY + 3 + (moH-6)*(i+0.5)/nbLines}
                  stroke="#999" strokeWidth={0.55}/>
              ))}
              {/* Séparateur grille/commandes */}
              <line x1={ctX} y1={moY+2} x2={ctX} y2={moY+moH-2} stroke="#bbb" strokeWidth={0.5}/>
              {/* Afficheur digital */}
              <rect x={dispX} y={dispY} width={dispW} height={dispH}
                rx={1} fill="#e8efe8" stroke="#666" strokeWidth={0.5}/>
              <text x={dispX+dispW/2} y={dispY+dispH*0.75}
                textAnchor="middle" fontSize={dispH*0.7} fill="#333" fontFamily="monospace">38</text>
              {/* 6 boutons 2×3 */}
              {[0,1,2].map(row => [0,1].map(col => (
                <rect key={`${row}-${col}`}
                  x={col===0 ? btnX1 : btnX2} y={btnY0 + row*(btnS+2)}
                  width={btnS} height={btnS}
                  rx={0.5} fill="#e0e0e0" stroke="#888" strokeWidth={0.4}/>
              )))}
              {/* Bouton rectangulaire bas */}
              {longBtnY + btnS * 0.6 < moY + moH - 1 && (
                <rect x={btnX1} y={longBtnY} width={btnS*2+2} height={btnS*0.6}
                  rx={0.5} fill="#e0e0e0" stroke="#888" strokeWidth={0.4}/>
              )}
            </>);
          })()}
          {upperType!=='micro' && upperType!=='etageres' && upperType!=='mixte' && upperType!=='vide' && upperType!=='hood' && cw <= 60 && (() => {
            const href = "images/rangement_haut_45.svg";
            return <image href={href} x={xPos} y={y} width={cw} height={h} preserveAspectRatio="none" />;
          })()}
          {upperType!=='micro' && upperType!=='etageres' && upperType!=='mixte' && upperType!=='vide' && upperType!=='hood' && cw > 60 && (() => {
            const href = "images/rangement_haut_60.svg";
            return <image href={href} x={xPos} y={y} width={cw} height={h} preserveAspectRatio="none" />;
          })()}
        </g>
      );
    };

    function buildQuoteSummary({ wallLen, colCfg, colTypes, extraCols, cabs, wins, doorStyle, price }) {
      const colLabels = { A:'Sans colonne', B:'Colonne gauche', C:'Colonne droite', D:'Colonnes gauche + droite', E:'Colonne centre' };
      const typeLabels = { colonne:'Rangement', frigo:'Réfrigérateur', four:'Colonne four', frigo_libre:'Frigo pose libre' };
      const lowerLabels = { rangement:'Rangement portes', tiroirs:'Tiroirs', evier:'Sous-évier', lv:'Lave-vaisselle', four:'Four encastré' };
      const upperLabels = { rangement:'Rangement fermé', etageres:'Étagères ouvertes', mixte:'Porte + étagères', vide:'Espace vide', micro:'Micro-onde' };
      const doorLabels  = { smooth:'Lisse', frame:'Cadre' };

      const lines = [];
      lines.push('━━ RÉCAPITULATIF CUISINE ━━');
      lines.push('Longueur du mur : ' + wallLen + ' cm (' + (wallLen/100).toFixed(2) + ' m)');
      lines.push('Configuration colonnes : ' + (colLabels[colCfg] || colCfg));

      const fixedColTypes = Object.values(colTypes).filter(Boolean);
      if (fixedColTypes.length)
        lines.push('Colonnes fixes : ' + fixedColTypes.map(t => typeLabels[t]||t).join(', '));

      if (extraCols.length)
        lines.push('Colonnes ajoutées : ' + extraCols.map(ec => (typeLabels[ec.colType]||ec.colType) + ' ' + ec.w + 'cm').join(', '));

      lines.push('Style de porte : ' + (doorLabels[doorStyle] || doorStyle));

      if (wins.length)
        lines.push('Fenêtres : ' + wins.map(w => w.w + 'cm à x=' + w.pos + 'cm').join(', '));

      lines.push('');
      lines.push('Meubles bas (' + cabs.length + ' modules) :');
      cabs.forEach((c, i) => {
        const lt = (lowerLabels[c.lowerType] || c.lowerType) + (c.hasPlaque ? ' + plaque induction' : '');
        const ut = upperLabels[c.upperType]  || c.upperType;
        const upperInfo = c.upperMode === 'upper' ? ' · Haut: ' + ut : ' · Sans meuble haut';
        lines.push('  ' + (i+1) + '. ' + c.w + 'cm — ' + lt + upperInfo);
      });

      if (price) {
        lines.push('');
        lines.push('━━ BUDGET ESTIMATIF (HT) ━━');
        lines.push('Meubles bas          : ' + price.lower.toLocaleString('fr-FR') + ' €');
        lines.push('Meubles hauts        : ' + price.upper.toLocaleString('fr-FR') + ' €');
        if (price.cols > 0)
          lines.push('Colonnes             : ' + price.cols.toLocaleString('fr-FR') + ' €');
        lines.push('Plan de travail      : ' + price.worktopLow.toLocaleString('fr-FR') + ' – ' + price.worktopHigh.toLocaleString('fr-FR') + ' €');
        lines.push('──────────────────────────────');
        lines.push('TOTAL ESTIMÉ         : ' + price.totalLow.toLocaleString('fr-FR') + ' – ' + price.totalHigh.toLocaleString('fr-FR') + ' €');
        lines.push('(fourniture + pose · hors électroménager · hors TVA)');
      }

      return lines.join('\n');
    }

    // ====== COMPOSANT PRINCIPAL ======
    function KitchenDesigner() {
      const [wallLen,        setWallLen]        = React.useState(360);
      const [colCfg,         setColCfg]          = React.useState('A');
      const [colTypes,       setColTypes]        = React.useState(['colonne','colonne']);
      const [extraCols,      setExtraCols]       = React.useState([]);
      const [selectedExtraColId, setSelectedExtraColId] = React.useState(null);
      const [selectedColIdx, setSelectedColIdx]  = React.useState(null);
      const [wins,           setWins]            = React.useState([]);
      const [cabs,           setCabs]            = React.useState(() => genCabs(360,'A'));
      const [selLowerId,     setSelLowerId]      = React.useState(null);
      const [selUpperId,     setSelUpperId]      = React.useState(null);
      const [phase,          setPhase]           = React.useState('layout');
      const [doorStyle,      setDoorStyle]       = React.useState('smooth');
      const [showLeadModal,  setShowLeadModal]   = React.useState(false);
      const [winPos,         setWinPos]          = React.useState(150);
      const [winW,           setWinW]            = React.useState(90);
      const [winIdCounter,   setWinIdCounter]    = React.useState(0);
      const [draggingWin,    setDraggingWin]     = React.useState(null);
      const [statusMsg,      setStatusMsg]       = React.useState(null);
      const [canvasW,        setCanvasW]         = React.useState(800);

      const svgRef    = React.useRef(null);
      const canvasRef = React.useRef(null);

      // Auto-scale : mesure la largeur du canvas disponible
      React.useEffect(() => {
        if (!canvasRef.current) return;
        const ro = new ResizeObserver(entries => {
          const w = entries[0].contentRect.width;
          setCanvasW(w);
        });
        ro.observe(canvasRef.current);
        return () => ro.disconnect();
      }, []);

      const selLower = cabs.find(c => c.id === selLowerId) ?? null;
      const selUpper = cabs.find(c => c.id === selUpperId) ?? null;
      const cols     = React.useMemo(() => getColPositions(wallLen, colCfg), [wallLen, colCfg]);
      const [cs, ce] = React.useMemo(() => getCabRange(wallLen, colCfg), [wallLen, colCfg]);
      const usedW    = React.useMemo(() => cabs.reduce((a,c) => a+c.w, 0), [cabs]);
      const diff     = usedW - (ce - cs);

      // Dimensions SVG naturelles (2px par cm)
      const svgW = wallLen + C.MARGIN * 2;
      const svgH = C.VIEW_H + C.MARGIN * 2;

      // Scale pour tenir dans le canvas (padding 32px × 2 = 64)
      const availW   = Math.max(200, canvasW - 64);
      const naturalW = svgW * 2;
      const scale    = naturalW > availW ? availW / naturalW : 1;
      const dispW    = Math.round(naturalW * scale);
      const dispH    = Math.round(svgH * 2 * scale);

      const hasColFour = colTypes.some(t => t==='four');
      const hasEvier   = cabs.some(c => c.lowerType==='evier');
      const hasLV      = cabs.some(c => c.lowerType==='lv');
      const hasHood    = cabs.some(c => c.upperMode==='hood');

      const flash = (type, text) => { setStatusMsg({type, text}); setTimeout(() => setStatusMsg(null), 3000); };

      const regenCabs = (wl, cfg) => {
        setCabs(genCabs(wl, cfg)); setSelLowerId(null); setSelUpperId(null); setExtraCols([]); setSelectedExtraColId(null);
        const n = getColPositions(wl, cfg).length;
        setColTypes(prev => Array.from({length:n},(_,i) => prev[i] ?? 'colonne'));
        setSelectedColIdx(null);
      };

      const updWithReflow = (id, changes) => {
        const idx = cabs.findIndex(c => c.id===id); if (idx===-1) return;
        const [start, end] = getCabRange(wallLen, colCfg);
        const totalZone = (end - start) - extraCols.filter(ec => ec.x >= start && ec.x + ec.w <= end).reduce((s, ec) => s + ec.w, 0);

        // Applique le changement sur le meuble cible
        let newCabs = cabs.map(c => c.id===id ? {...c,...changes} : c);

        if (changes.w !== undefined) {
          // Calcul de la somme sans le dernier meuble
          // Si le reste disponible pour le dernier meuble est insuffisant,
          // on supprime automatiquement le dernier meuble et on réessaie — en chaîne.
          let working = [...newCabs];
          while (working.length > 1) {
            const sumAll = working.reduce((a,c) => a + c.w, 0);
            const lastIdx = working.length - 1;
            const sumBefore = sumAll - working[lastIdx].w;
            const lastW = totalZone - sumBefore;

            if (lastW >= 15) {
              // Le dernier meuble absorbe le reste — type rangement si non-standard
              const last = working[lastIdx];
              const lastType = isStdWidth(lastW)
                ? fixLowerType(last.lowerType, lastW, hasColFour, working, last.id)
                : 'rangement';
              working[lastIdx] = {...last, w: lastW, lowerType: lastType};
              break;
            } else if (lastW <= 0) {
              // Le dernier meuble n'a plus de place : on le supprime
              working = working.slice(0, lastIdx);
            } else {
              // Reste entre 1 et 14cm : trop petit pour un meuble, on supprime aussi
              working = working.slice(0, lastIdx);
            }
          }

          // Sécurité : si on n'a plus qu'un seul meuble, il prend toute la zone
          if (working.length === 1) {
            const targetW = totalZone;
            const only = working[0];
            const onlyType = isStdWidth(targetW)
              ? fixLowerType(only.lowerType, targetW, hasColFour, working, only.id)
              : 'rangement';
            working[0] = {...only, w: targetW, lowerType: onlyType};
          }

          newCabs = splitOversized(working);
        }

        setCabs(repackCabs(newCabs, start, extraCols));
      };

      const upd = (id, ch) => setCabs(p => p.map(c => c.id===id ? {...c,...ch} : c));

      const addWin = () => {
        if (winW < 30) { flash('error', "Largeur min. d'une fenêtre : 30cm"); return; }
        if (winPos + winW > wallLen) { flash('error', "La fenêtre dépasse le mur"); return; }
        setWins(p => [...p, {id:winIdCounter, pos:winPos, w:winW}]);
        setWinIdCounter(i => i+1);
        flash('success', 'Fenêtre ajoutée');
      };

      const getSvgCm = clientX => {
        const svg = svgRef.current; if (!svg) return 0;
        const rect = svg.getBoundingClientRect();
        return (clientX - rect.left) * svgW / rect.width - C.MARGIN;
      };
      const clampWinPos = (desired, ww) => {
        const forbidden = [
          ...getColPositions(wallLen, colCfg).map(cX => ({ lo: cX-ww, hi: cX+C.COL_W })),
          ...extraCols.map(ec => ({ lo: ec.x-ww, hi: ec.x+ec.w }))
        ];
        let p = Math.max(0, Math.min(wallLen-ww, desired));
        for (const {lo, hi} of forbidden) {
          if (p > lo && p < hi)
            p = desired <= (lo+hi)/2 ? Math.max(0, lo) : Math.min(wallLen-ww, hi);
        }
        return Math.round(p);
      };
      const onWinDragStart = (winId, winPosNow, e) =>
        setDraggingWin({id:winId, startCm:getSvgCm(e.clientX), startPos:winPosNow});
      const onSvgMouseMove = e => {
        if (!draggingWin) return;
        const dx = getSvgCm(e.clientX) - draggingWin.startCm;
        const win = wins.find(w => w.id===draggingWin.id); if (!win) return;
        setWins(prev => prev.map(w => w.id===draggingWin.id ? {...w, pos:clampWinPos(draggingWin.startPos+dx, w.w)} : w));
      };
      const onSvgMouseUp = () => setDraggingWin(null);
      const clearSel = () => { setSelLowerId(null); setSelUpperId(null); setSelectedColIdx(null); };

      const saveDesign = () => {
        try {
          localStorage.setItem('kitchenDesign', JSON.stringify({wallLen,colCfg,colTypes,extraCols,wins,cabs,doorStyle}));
          flash('success','Design sauvegardé ✓');
        } catch(e) { flash('error','Erreur sauvegarde'); }
      };
      const loadDesign = () => {
        try {
          const saved = localStorage.getItem('kitchenDesign');
          if (!saved) { flash('error','Aucun design sauvegardé'); return; }
          const d = JSON.parse(saved);
          setWallLen(d.wallLen); setColCfg(d.colCfg); setColTypes(d.colTypes); if(d.extraCols) setExtraCols(d.extraCols);
          setWins(d.wins); setCabs(d.cabs); setDoorStyle(d.doorStyle);
          flash('success','Design chargé ✓');
        } catch(e) { flash('error','Erreur chargement'); }
      };
      const exportToPng = () => {
        const svgEl = svgRef.current; if (!svgEl) return;
        htmlToImage.toPng(svgEl, { backgroundColor: '#ffffff' })
          .then(dataUrl => {
            const a = document.createElement('a');
            a.download = 'cuisine-elevation.png'; a.href = dataUrl; a.click();
            flash('success','Export PNG ✓');
          })
          .catch(err => flash('error', 'Erreur export'));
      };

      // ── Panneaux ──────────────────────────────────────────────────────
      const LowerPanel = () => {
        if (!selLower) return (
          <div style={{fontSize:'11px',color:'#bbb',textAlign:'center',padding:'14px 0',border:'1px dashed #e8e8e8',marginBottom:'14px',borderRadius:'2px'}}>
            Cliquer un meuble pour l'éditer
          </div>
        );
        const isEvierSel = selLower.lowerType==='evier';
        const isLvSel    = selLower.lowerType==='lv';
        return (
          <Sec title={`Meuble bas · x=${selLower.x}cm · ${selLower.w}cm`}>
            <div style={{fontSize:'10px',color:'#999',marginBottom:'5px',letterSpacing:'1px'}}>LARGEUR</div>
            <div style={{display:'flex',gap:'4px',marginBottom:'10px'}}>
              {[45,60,90].map(w => (
                <Btn key={w} active={selLower.w===w}
                  onClick={() => updWithReflow(selLower.id,{w, lowerType:fixLowerType(selLower.lowerType,w,hasColFour,cabs,selLower.id)})}>
                  {w}cm
                </Btn>
              ))}
            </div>
            <div style={{fontSize:'10px',color:'#999',marginBottom:'5px',letterSpacing:'1px'}}>TYPE</div>
            <div style={{display:'flex',flexDirection:'column',gap:'3px'}}>
              {LOWER_TYPES.map(t => {
                const widthIncompat = t.widths && !t.widths.includes(selLower.w);
                const colFourBlock  = t.noColFour && hasColFour;
                const evierDup      = t.id==='evier' && hasEvier && !isEvierSel;
                const lvDup         = t.id==='lv' && hasLV && !isLvSel;
                const disabled = widthIncompat || colFourBlock || evierDup || lvDup;
                const reason = widthIncompat ? `nécessite ${t.widths?.join(' ou ')}cm`
                             : colFourBlock  ? 'incompatible avec colonne four'
                             : evierDup      ? 'évier déjà présent'
                             : lvDup         ? 'lave-vaisselle déjà présent' : '';
                return (
                  <Btn key={t.id} active={selLower.lowerType===t.id} disabled={disabled}
                    title={disabled ? reason : ''}
                    onClick={() => {
                      const newType = t.id;
                      const plaqueMaker = newType === 'four' || newType === 'rang_plaque';
                      const plaqueKiller = newType === 'evier';
                      const otherHasPlaque = cabs.some(c => c.id !== selLower.id && c.hasPlaque);
                      setCabs(p => p.map(c => {
                        if (c.id === selLower.id) {
                          const newHasPlaque = plaqueKiller ? false
                            : plaqueMaker && !otherHasPlaque ? true
                            : c.hasPlaque;
                          return {...c, lowerType: newType, hasPlaque: newHasPlaque};
                        }
                        return c;
                      }));
                    }}
                    style={{textAlign:'left',fontSize:'11px'}}>
                    {t.label}{disabled ? ' ⊘' : ''}
                  </Btn>
                );
              })}
            </div>

            {/* Plaque de cuisson */}
            {(() => {
              const isEvier = selLower.lowerType === 'evier';
              const otherHasPlaque = cabs.some(c => c.id !== selLower.id && c.hasPlaque);
              const disabled = isEvier || (otherHasPlaque && !selLower.hasPlaque);
              const reason = isEvier ? 'Non disponible sur évier'
                           : (otherHasPlaque && !selLower.hasPlaque) ? 'Plaque déjà placée' : '';
              return (
                <div style={{marginTop:'10px', paddingTop:'10px', borderTop:'1px solid #eee'}}>
                  <div style={{fontSize:'10px',color:'#999',marginBottom:'5px',letterSpacing:'1px'}}>PLAQUE DE CUISSON</div>
                  <Btn
                    active={!!selLower.hasPlaque}
                    disabled={disabled}
                    title={disabled ? reason : ''}
                    style={{width:'100%', textAlign:'center', fontSize:'11px'}}
                    onClick={() => {
                      const newVal = !selLower.hasPlaque;
                      setCabs(p => p.map(c =>
                        newVal
                          ? {...c, hasPlaque: c.id === selLower.id}
                          : c.id === selLower.id ? {...c, hasPlaque: false} : c
                      ));
                    }}>
                    🔥 {selLower.hasPlaque ? 'Plaque présente ✓' : 'Ajouter une plaque'}{disabled && !selLower.hasPlaque ? ' ⊘' : ''}
                  </Btn>
                  {disabled && <div style={{fontSize:'10px',color:'#bbb',marginTop:'4px'}}>{reason}</div>}
                </div>
              );
            })()}

            {/* Conversion en colonne */}
            {(() => {
              const [cs, ce] = getCabRange(wallLen, colCfg);
              const fixedCols = getColPositions(wallLen, colCfg);
              // Vérifier si le meuble est adjacent à une colonne (fixe ou ajoutée)
              const cabLeft  = selLower.x;
              const cabRight = selLower.x + selLower.w;
              // Colonnes fixes : positions dans [0,wallLen], x réel = xPos+C.MARGIN
              const isAdjacentToCol = fixedCols.some(cxPos => {
                const colLeft  = cxPos;
                const colRight = cxPos + C.COL_W;
                return Math.abs(cabLeft - colRight) < 2 || Math.abs(cabRight - colLeft) < 2;
              });
              // Vérifier que le meuble haut au-dessus a la même largeur
              const upperMatch = cabs.find(c => c.x === selLower.x && c.w === selLower.w);
              const canConvert = isAdjacentToCol && [30,45,60].includes(selLower.w);
              const blockReason = !isAdjacentToCol ? 'doit être adjacent à une colonne'
                                : !canConvert      ? 'largeur doit être 30, 45 ou 60cm' : '';
              if (!canConvert && !isAdjacentToCol) return null;
              return (
                <div style={{marginTop:'10px',paddingTop:'10px',borderTop:'1px solid #eee'}}>
                  <div style={{fontSize:'10px',color:'#999',marginBottom:'5px',letterSpacing:'1px'}}>CONVERSION</div>
                  {canConvert ? (
                    <Btn style={{width:'100%',textAlign:'center'}} onClick={() => {
                      // Supprimer le meuble bas et le meuble haut correspondant
                      // Ajouter une colonne supplémentaire à cette position
                      const newCabs = cabs.filter(c => c.x !== selLower.x || c.w !== selLower.w);
                      // Ajouter la colonne dans colTypes en tant que colonne additionnelle
                      // On stocke les colonnes additionnelles dans un état séparé
                      setExtraCols(prev => [...prev, { x: selLower.x, w: selLower.w, colType: 'colonne', id: Date.now() }]);
                      setCabs(newCabs);
                      setSelLowerId(null);
                    }}>
                      ➕ Convertir en colonne
                    </Btn>
                  ) : (
                    <div style={{fontSize:'10px',color:'#bbb'}}>{blockReason}</div>
                  )}
                </div>
              );
            })()}
          </Sec>
        );
      };

      const UpperPanel = () => {
        if (!selUpper) return null;
        const isWinZone = hasWinOverlap(selUpper, wins);
        return (
          <Sec title={`Meuble haut · x=${selUpper.x}cm · ${selUpper.w}cm`}>
            {isWinZone ? (
              <div style={{fontSize:'11px',color:'#c87000',padding:'6px 8px',border:'1px solid #f0c060',background:'#fffbf0',borderRadius:'2px'}}>
                ⚠ Zone fenêtre — aucun élément haut possible
              </div>
            ) : (<>
              <div style={{fontSize:'10px',color:'#999',marginBottom:'5px',letterSpacing:'1px'}}>ÉLÉMENT HAUT</div>
              <div style={{display:'flex',gap:'4px',marginBottom:'8px',flexWrap:'wrap'}}>
                <Btn active={selUpper.upperMode==='upper'} onClick={() => upd(selUpper.id,{upperMode:'upper'})}>Meuble</Btn>
                <Btn active={selUpper.upperMode==='hood'}
                  disabled={selUpper.w<60 || (hasHood && selUpper.upperMode!=='hood')}
                  title={selUpper.w<60 ? 'Hotte nécessite ≥60cm' : (hasHood && selUpper.upperMode!=='hood') ? 'Hotte déjà placée' : ''}
                  onClick={() => upd(selUpper.id,{upperMode:'hood',hoodW:Math.min(60,selUpper.w)})}>
                  Hotte 🔥
                </Btn>
                <Btn active={selUpper.upperMode==='none'} onClick={() => upd(selUpper.id,{upperMode:'none'})}>Aucun</Btn>
              </div>
              {hasHood && selUpper.upperMode!=='hood' && (
                <div style={{fontSize:'10px',color:'#c87000',padding:'5px 6px',border:'1px solid #f0c060',background:'#fffbf0',borderRadius:'2px',marginBottom:'8px'}}>
                  ⚠ Une seule hotte possible
                </div>
              )}
              {selUpper.upperMode==='upper' && (<>
                <div style={{fontSize:'10px',color:'#999',marginBottom:'5px',letterSpacing:'1px'}}>STYLE</div>
                <div style={{display:'flex',flexDirection:'column',gap:'3px',marginBottom:'6px'}}>
                  {UPPER_TYPES.map(t => (
                    <Btn key={t.id} active={selUpper.upperType===t.id}
                      onClick={() => upd(selUpper.id,{upperType:t.id})}
                      style={{textAlign:'left',fontSize:'11px'}}>{t.label}</Btn>
                  ))}
                </div>
              </>)}
              {selUpper.upperMode==='hood' && selUpper.w>=60 && (<>
                <div style={{fontSize:'10px',color:'#999',marginBottom:'5px',letterSpacing:'1px'}}>LARGEUR HOTTE</div>
                <div style={{display:'flex',gap:'4px'}}>
                  {[60,90].filter(hw => hw<=selUpper.w).map(hw => (
                    <Btn key={hw} active={selUpper.hoodW===hw} onClick={() => upd(selUpper.id,{hoodW:hw})}>{hw}cm</Btn>
                  ))}
                </div>
              </>)}
            </>)}
          </Sec>
        );
      };

      // ── Rendu principal ───────────────────────────────────────────────
      const price = calcPrice({ cabs, colCfg, colTypes, extraCols, wallLen });
      const quoteSummary = buildQuoteSummary({ wallLen, colCfg, colTypes, extraCols, cabs, wins, doorStyle, price });

      return (
        <div style={{fontFamily:'Courier New, monospace',background:'#fff',minHeight:'100vh',color:'#222',display:'flex',flexDirection:'column'}}
          onMouseMove={draggingWin ? onSvgMouseMove : undefined}
          onMouseUp={draggingWin ? onSvgMouseUp : undefined}
          onMouseLeave={draggingWin ? onSvgMouseUp : undefined}>

          {/* Header */}
          <div style={{padding:'10px 20px',borderBottom:'1px solid #e8e8e8',background:'#fff',display:'flex',alignItems:'center',gap:'16px'}}>
            <span style={{fontSize:'14px',letterSpacing:'5px',color:'#111',fontWeight:'bold'}}>LINÉAIRE CUISINE</span>
            <span style={{fontSize:'9px',color:'#bbb',letterSpacing:'2px'}}>GÉNÉRATEUR 2D · VUE EN ÉLÉVATION</span>
            {statusMsg && (
              <div style={{marginLeft:'auto',fontSize:'8px',padding:'3px 10px',border:'1px solid',borderRadius:'2px',
                color: statusMsg.type==='success' ? '#1a7a3a' : '#cc2222',
                borderColor: statusMsg.type==='success' ? '#a0d8b0' : '#f0a0a0',
                background: statusMsg.type==='success' ? '#f0fff5' : '#fff5f5'}}>
                {statusMsg.text}
              </div>
            )}
          </div>

          <div style={{display:'flex',flex:1,overflow:'hidden'}}>

            {/* ── Sidebar ── */}
            <div style={{width:'260px',flexShrink:0,background:'#fafafa',borderRight:'1px solid #e8e8e8',padding:'14px',overflowY:'auto',display:'flex',flexDirection:'column'}}>

              <Sec title="Longueur du mur">
                <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                  <input type="range" min={180} max={600} step={15} value={wallLen}
                    onChange={e => { const v=+e.target.value; setWallLen(v); regenCabs(v,colCfg); }}
                    style={{flex:1}} />
                  <span style={{fontSize:'15px',minWidth:'48px',textAlign:'right',fontWeight:'bold'}}>{wallLen}cm</span>
                </div>
              </Sec>

              <Sec title="Colonnes">
                <div style={{display:'flex',gap:'4px',marginBottom:'6px'}}>
                  {['none','A','B','C','D','E'].map(c => (
                    <Btn key={c} active={colCfg===c} onClick={() => { setColCfg(c); regenCabs(wallLen,c); }}>
                      {c==='none' ? '∅' : c}
                    </Btn>
                  ))}
                </div>
                <div style={{fontSize:'11px',color:'#aaa'}}>
                  {colCfg==='A' && '1 gauche + 1 droite'}
                  {colCfg==='B' && '2 colonnes à droite'}
                  {colCfg==='C' && '2 colonnes à gauche'}
                  {colCfg==='D' && '1 colonne à gauche'}
                  {colCfg==='E' && '1 colonne à droite'}
                  {colCfg==='none' && 'Aucune colonne'}
                </div>
              </Sec>

              {colCfg!=='none' && cols.length>0 && (
                <Sec title="Type de colonne">
                  {selectedColIdx!==null ? (<>
                    <div style={{fontSize:'11px',color:'#3366cc',marginBottom:'8px'}}>
                      Colonne {selectedColIdx+1} — {cols[selectedColIdx]}cm
                    </div>
                    <div style={{display:'flex',flexDirection:'column',gap:'3px',marginBottom:'8px'}}>
                      {COL_TYPES.map(t => {
                        // frigo_libre uniquement pour colonne d'extrémité du linéaire
                        // A: col0=gauche extrémité, col1=droite extrémité
                        // B: col0=intérieure, col1=droite extrémité
                        // C: col0=gauche extrémité, col1=intérieure
                        // D: col0=gauche extrémité (seule)
                        // E: col0=droite extrémité (seule)
                        const isLeftExtreme  = (colCfg==='A' && selectedColIdx===0)
                                            || (colCfg==='C' && selectedColIdx===0)
                                            || colCfg==='D';
                        const isRightExtreme = (colCfg==='A' && selectedColIdx===cols.length-1)
                                            || (colCfg==='B' && selectedColIdx===cols.length-1)
                                            || colCfg==='E';
                        const isExtreme = isLeftExtreme || isRightExtreme;
                        const disabled  = t.id==='frigo_libre' && !isExtreme;
                        return (
                        <Btn key={t.id} active={(colTypes[selectedColIdx]||'colonne')===t.id}
                          disabled={disabled}
                          title={disabled ? 'Uniquement pour colonne en bout de linéaire' : ''}
                          onClick={() => !disabled && setColTypes(prev => { const a=[...prev]; a[selectedColIdx]=t.id; return a; })}
                          style={{textAlign:'left',fontSize:'11px'}}>
                          {t.id==='colonne'?'◼ ':t.id==='frigo'?'❄ ':'🔥 '}{t.label}
                        </Btn>
                        );
                      })}
                    </div>
                    {hasColFour && <div style={{fontSize:'10px',color:'#c87000',padding:'5px 6px',border:'1px solid #f0c060',background:'#fffbf0',borderRadius:'2px',marginBottom:'6px'}}>⚠ Four bas désactivé</div>}
                    <Btn onClick={() => setSelectedColIdx(null)} style={{fontSize:'8px',width:'100%',textAlign:'center'}}>← Retour</Btn>
                  </>) : (
                    <div style={{display:'flex',gap:'4px',flexWrap:'wrap'}}>
                      {cols.map((cx,i) => (
                        <Btn key={i} onClick={() => { setSelectedColIdx(i); clearSel(); }} style={{fontSize:'9px'}}>
                          Col.{i+1} {colTypes[i]==='frigo'?'❄':colTypes[i]==='four'?'🔥':'◼'}
                        </Btn>
                      ))}
                    </div>
                  )}
                </Sec>
              )}

              <Sec title="Fenêtres">
                {wins.map(w => (
                  <div key={w.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:'12px',color:'#3366cc',marginBottom:'6px'}}>
                    <span>⊞ {w.pos}cm + {w.w}cm</span>
                    <button onClick={() => setWins(p => p.filter(x => x.id!==w.id))}
                      style={{background:'none',border:'none',color:'#cc3333',cursor:'pointer',fontSize:'14px',padding:'0 2px',lineHeight:1}}>×</button>
                  </div>
                ))}
                <div style={{fontSize:'10px',color:'#bbb',marginBottom:'6px'}}>↔ Glisser sur le plan</div>
                <div style={{display:'flex',gap:'6px',marginBottom:'6px'}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:'10px',color:'#999',marginBottom:'3px'}}>POSITION</div>
                    <input type="number" value={winPos}
                      onChange={e => setWinPos(Math.max(0, Math.min(wallLen-winW, +e.target.value)))} />
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:'10px',color:'#999',marginBottom:'3px'}}>LARGEUR</div>
                    <input type="number" value={winW}
                      onChange={e => setWinW(Math.max(30, Math.min(wallLen-winPos, +e.target.value)))} />
                  </div>
                </div>
                <Btn onClick={addWin} style={{width:'100%',textAlign:'center'}}>+ Ajouter fenêtre</Btn>
              </Sec>

              {selectedExtraColId !== null && extraCols.find(c=>c.id===selectedExtraColId) ? (() => {
                const ec = extraCols.find(c=>c.id===selectedExtraColId);
                return (
                  <Sec title={`Colonne ajoutée · ${ec.w}cm`}>
                    <div style={{fontSize:'10px',color:'#999',marginBottom:'5px',letterSpacing:'1px'}}>LARGEUR</div>
                    <div style={{display:'flex',gap:'4px',marginBottom:'10px'}}>
                      {[30,45,60].map(sz => (
                        <Btn key={sz} active={ec.w===sz}
                          onClick={() => {
                            const oldW = ec.w;
                            const diff = sz - oldW;
                            // Mettre à jour la largeur de la colonne
                            setExtraCols(prev => prev.map(c => c.id===ec.id
                              ? {...c, w:sz, colType: c.colType==='four' && sz!==60 ? 'colonne' : c.colType}
                              : c));
                            // Reflow des meubles bas/haut : absorber la différence sur le meuble adjacent
                            if (diff !== 0) {
                              setCabs(prev => {
                                const sorted = [...prev].sort((a,b)=>a.x-b.x);
                                // Trouver le meuble adjacent à droite ou gauche de la colonne
                                const colRight = ec.x + oldW;
                                const colLeft  = ec.x;
                                // Adjacent à droite (colonne à gauche du meuble)
                                let adjIdx = sorted.findIndex(c => Math.abs(c.x - colRight) < 2);
                                if (adjIdx >= 0) {
                                  const adj = sorted[adjIdx];
                                  const newW = adj.w - diff;
                                  if (newW >= 20) {
                                    sorted[adjIdx] = {...adj, x: adj.x + diff, w: newW};
                                  }
                                } else {
                                  // Adjacent à gauche (colonne à droite du meuble)
                                  adjIdx = sorted.findIndex(c => Math.abs((c.x + c.w) - colLeft) < 2);
                                  if (adjIdx >= 0) {
                                    const adj = sorted[adjIdx];
                                    const newW = adj.w - diff;
                                    if (newW >= 20) sorted[adjIdx] = {...adj, w: newW};
                                  }
                                }
                                return sorted;
                              });
                            }
                          }}>
                          {sz}cm
                        </Btn>
                      ))}
                    </div>
                    <div style={{fontSize:'10px',color:'#999',marginBottom:'5px',letterSpacing:'1px'}}>TYPE</div>
                    <div style={{display:'flex',gap:'4px',marginBottom:'10px'}}>
                      <Btn active={ec.colType!=='four'}
                        onClick={() => setExtraCols(prev => prev.map(c => c.id===ec.id ? {...c, colType:'colonne'} : c))}>
                        Rangement
                      </Btn>
                      <Btn active={ec.colType==='four'} disabled={ec.w!==60}
                        title={ec.w!==60 ? 'Nécessite 60cm' : ''}
                        onClick={() => ec.w===60 && setExtraCols(prev => prev.map(c => c.id===ec.id ? {...c, colType:'four'} : c))}>
                        Four {ec.w!==60 ? '⊘' : ''}
                      </Btn>
                    </div>
                    <Btn style={{width:'100%',textAlign:'center'}}
                      onClick={() => {
                        setExtraCols(prev => prev.filter(c => c.id !== ec.id));
                        setCabs(prev => {
                          const newCab = {id: Date.now(), x: ec.x, w: ec.w, lowerType:'rangement', upperMode:'upper', upperType:'rangement', hoodW:60};
                          return [...prev, newCab].sort((a,b)=>a.x-b.x);
                        });
                        setSelectedExtraColId(null);
                      }}>
                      🗑 Supprimer la colonne
                    </Btn>
                  </Sec>
                );
              })() : selUpperId!==null ? <UpperPanel /> : <LowerPanel />}



              {/* ── Budget estimatif ── */}
              {cabs.length > 0 && (
                <div style={{marginBottom:'14px',padding:'12px',background:'#f9f9f9',border:'1px solid #e8e8e8',borderRadius:'2px'}}>
                  <div style={{fontSize:'9px',letterSpacing:'2px',color:'#888',marginBottom:'10px',textTransform:'uppercase',borderBottom:'1px solid #e8e8e8',paddingBottom:'6px'}}>
                    Budget estimatif
                  </div>
                  {[
                    ['Meubles bas',    fmt(price.lower),  null],
                    ['Meubles hauts',  fmt(price.upper),  null],
                    price.cols > 0 ? ['Colonnes', fmt(price.cols), null] : null,
                    ['Plan de travail', fmt(price.worktopLow), fmt(price.worktopHigh)],
                  ].filter(Boolean).map(([label, lo, hi]) => (
                    <div key={label} style={{display:'flex',justifyContent:'space-between',fontSize:'10px',marginBottom:'4px',color:'#555'}}>
                      <span>{label}</span>
                      <span style={{fontWeight:'500',color:'#333'}}>
                        {hi ? `${lo} – ${hi}` : lo}
                      </span>
                    </div>
                  ))}
                  <div style={{borderTop:'1px solid #ddd',marginTop:'8px',paddingTop:'8px',display:'flex',justifyContent:'space-between',alignItems:'baseline'}}>
                    <span style={{fontSize:'9px',letterSpacing:'1px',color:'#888',textTransform:'uppercase'}}>Total HT</span>
                    <span style={{fontSize:'13px',fontWeight:'bold',color:'#111',letterSpacing:'-0.5px'}}>
                      {fmt(price.totalLow)} – {fmt(price.totalHigh)}
                    </span>
                  </div>
                  <div style={{fontSize:'8.5px',color:'#bbb',marginTop:'5px',lineHeight:'1.5'}}>
                    Fourniture + pose · hors électroménager
                  </div>
                </div>
              )}

              <div style={{marginTop:'auto',paddingTop:'10px',borderTop:'1px solid #e8e8e8'}}>
                {phase==='layout' ? (
                  <Btn onClick={() => setPhase('finish')} style={{width:'100%',padding:'10px',textAlign:'center',letterSpacing:'1px',fontSize:'9px'}}>
                    VALIDER L'IMPLANTATION →
                  </Btn>
                ) : (<>
                  <div style={{fontSize:'10px',color:'#999',marginBottom:'8px',letterSpacing:'2px'}}>STYLE DE PORTE</div>
                  <div style={{display:'flex',gap:'4px',marginBottom:'10px'}}>
                    <Btn active={doorStyle==='smooth'} onClick={() => setDoorStyle('smooth')}>Lisse</Btn>
                    <Btn active={doorStyle==='frame'}  onClick={() => setDoorStyle('frame')}>Cadre</Btn>
                  </div>
                  <div style={{display:'flex',gap:'4px',marginBottom:'8px'}}>
                    <Btn onClick={saveDesign}  style={{flex:1,textAlign:'center',fontSize:'11px'}}> 💾</Btn>
                    <Btn onClick={loadDesign}  style={{flex:1,textAlign:'center',fontSize:'11px'}}> 📂</Btn>
                    <Btn onClick={exportToPng} style={{flex:1,textAlign:'center',fontSize:'11px'}}> 📷 PNG</Btn>
                  </div>
                  <button
                    onClick={() => setShowLeadModal(true)}
                    style={{width:'100%',padding:'10px',background:'#222',color:'#fff',border:'none',cursor:'pointer',fontFamily:'Courier New,monospace',fontSize:'10px',letterSpacing:'2px',marginBottom:'6px',textAlign:'center'}}>
                    📧 RECEVOIR MON DEVIS
                  </button>
                  <Btn onClick={() => setPhase('layout')} style={{width:'100%',textAlign:'center',fontSize:'9px'}}>← Modifier</Btn>
                </>)}
              </div>
            </div>

            {/* ── Canvas SVG ── */}
            <div ref={canvasRef}
              style={{flex:1,background:'#f2f2f2',padding:'32px',overflowX:'auto',overflowY:'auto',display:'flex',flexDirection:'column',alignItems:'flex-start'}}
              onClick={clearSel}>
              <div style={{background:'white',boxShadow:'0 2px 24px rgba(0,0,0,0.10)',display:'inline-block',border:'1px solid #e8e8e8'}}
                onClick={e => e.stopPropagation()}>
                {/* Barre titre du plan */}
                <div style={{padding:'7px 14px',background:'#f9f9f9',borderBottom:'1px solid #e8e8e8',display:'flex',justifyContent:'space-between',fontSize:'7.5px',color:'#999',fontFamily:'monospace'}}>
                  <span>ÉLÉVATION MUR — L={wallLen}cm{colCfg!=='none'?` · COL.${colCfg}`:''}</span>
                  <span>MB=85 · MH=72 · COL=215cm · ÉCH.1:1</span>
                </div>

                <svg ref={svgRef}
                  viewBox={`0 0 ${svgW} ${svgH}`}
                  width={dispW} height={dispH}
                  xmlns="http://www.w3.org/2000/svg"
                  style={{display:'block',cursor:draggingWin?'grabbing':'default',userSelect:'none'}}
                  onMouseMove={onSvgMouseMove} onMouseUp={onSvgMouseUp} onMouseLeave={onSvgMouseUp}>

                  {/* Grille légère */}
                  <g>
                    {Array.from({length:Math.ceil(svgW/10)+1},(_,i) =>
                      <line key={`v${i}`} x1={i*10} y1={0} x2={i*10} y2={svgH} stroke="#f0f0f0" strokeWidth={0.3} />)}
                    {Array.from({length:Math.ceil(svgH/10)+1},(_,i) =>
                      <line key={`h${i}`} x1={0} y1={i*10} x2={svgW} y2={i*10} stroke="#f0f0f0" strokeWidth={0.3} />)}
                  </g>

                  {/* Mur */}
                  <g>
                    <rect x={C.MARGIN} y={COL_TOP_Y} width={wallLen} height={C.COL_H} fill="#fafafa" />
                    <line x1={C.MARGIN} y1={COL_TOP_Y} x2={C.MARGIN} y2={FLOOR_Y} stroke="#555" strokeWidth={0.8} />
                    <line x1={C.MARGIN+wallLen} y1={COL_TOP_Y} x2={C.MARGIN+wallLen} y2={FLOOR_Y} stroke="#555" strokeWidth={0.8} />
                    <line x1={C.MARGIN} y1={FLOOR_Y} x2={C.MARGIN+wallLen} y2={FLOOR_Y} stroke="#222" strokeWidth={2.5} />
                  </g>

                  {/* Colonnes additionnelles */}
                  <g>{extraCols.map(ec => {
                    const x = C.MARGIN + ec.x, y = COL_TOP_Y, w = ec.w, h = C.COL_H;
                    const clipId = `extracol${ec.id}`;
                    const isSel = selectedExtraColId === ec.id;
                    return (
                      <g key={ec.id} onClick={e => { e.stopPropagation(); setSelectedExtraColId(prev => prev===ec.id ? null : ec.id); setSelLowerId(null); setSelUpperId(null); setSelectedColIdx(null); }} style={{cursor:'pointer'}}>
                        <defs><clipPath id={clipId}><rect x={x} y={y} width={w} height={h}/></clipPath></defs>
                        <rect x={x} y={y} width={w} height={h} fill="#e8e8e8"
                          stroke={isSel ? '#1a56cc' : '#333'} strokeWidth={isSel ? 2 : 1.5}/>
                        <image
                          href={ec.colType==='four' && ec.w===60
                            ? "images/four_colonne.svg"
                            : "images/frigo.svg"}
                          x={x} y={y} width={w} height={h}
                          preserveAspectRatio="none" clipPath={`url(#${clipId})`}/>
                      </g>
                    );
                  })}</g>

                  {/* Fenêtres */}
                  <g>{wins.map(w => <WinSvg key={w.id} win={w} onDragStart={onWinDragStart} isDragging={draggingWin?.id===w.id} />)}</g>

                  {/* Colonnes */}
                  <g>{cols.map((cx,i) => {
                    const isLeft = (colCfg==='A' && i===0) || colCfg==='C' || colCfg==='D';
                    return <ColSvg key={i} xPos={cx} doorStyle={doorStyle} idx={i} isLeft={isLeft}
                      colType={colTypes[i]} selected={selectedColIdx===i}
                      onClick={e => { e.stopPropagation(); setSelectedColIdx(prev=>prev===i?null:i); setSelLowerId(null); setSelUpperId(null); setSelectedExtraColId(null); }} />;
                  })}</g>

                  {/* Meubles hauts */}
                  <g>{cabs.map(c => <UpperSvg key={c.id} cab={c} doorStyle={doorStyle} wins={wins}
                    selected={selUpperId===c.id}
                    onSelect={() => { setSelUpperId(prev=>prev===c.id?null:c.id); setSelLowerId(null); setSelectedColIdx(null); setSelectedExtraColId(null); }} />)}</g>

                  {/* Meubles bas */}
                  <g>{cabs.map(c => <LowerSvg key={c.id} cab={c} selected={selLowerId===c.id}
                    onSelect={() => { setSelLowerId(prev=>prev===c.id?null:c.id); setSelUpperId(null); setSelectedColIdx(null); setSelectedExtraColId(null); }}
                    doorStyle={doorStyle} />)}</g>



                  {/* Cotations */}
                  <g>
                    <line x1={C.MARGIN} y1={svgY(C.LOWER_H+C.COUNTER_H)} x2={C.MARGIN+wallLen} y2={svgY(C.LOWER_H+C.COUNTER_H)} stroke="#ccc" strokeWidth={0.5} strokeDasharray="4,3" />
                    <line x1={C.MARGIN} y1={svgH-8} x2={C.MARGIN+wallLen} y2={svgH-8} stroke="#888" strokeWidth={0.7} />
                    <line x1={C.MARGIN} y1={svgH-12} x2={C.MARGIN} y2={svgH-4} stroke="#888" strokeWidth={0.7} />
                    <line x1={C.MARGIN+wallLen} y1={svgH-12} x2={C.MARGIN+wallLen} y2={svgH-4} stroke="#888" strokeWidth={0.7} />
                    <text x={C.MARGIN+wallLen/2} y={svgH-1} textAnchor="middle" fontSize={7.5} fill="#555" fontFamily="Courier New, monospace">{wallLen} cm</text>
                    <line x1={6} y1={FLOOR_Y} x2={6} y2={COL_TOP_Y} stroke="#ccc" strokeWidth={0.5} />
                    <line x1={3} y1={FLOOR_Y} x2={9} y2={FLOOR_Y} stroke="#ccc" strokeWidth={0.5} />
                    <line x1={3} y1={COL_TOP_Y} x2={9} y2={COL_TOP_Y} stroke="#ccc" strokeWidth={0.5} />
                    <text x={4} y={(FLOOR_Y+COL_TOP_Y)/2} textAnchor="middle" fontSize={6.5} fill="#888" fontFamily="monospace"
                      transform={`rotate(-90,4,${(FLOOR_Y+COL_TOP_Y)/2})`}>{C.COL_H} cm</text>
                  </g>
                </svg>
              </div>

              {/* Légende */}
              <div style={{display:'flex',gap:'16px',marginTop:'12px',fontSize:'11px',color:'#999',flexWrap:'wrap'}}>
                <span>◻ Meuble bas — clic pour éditer</span>
                <span>▦ Meuble haut — clic pour éditer</span>
                <span>▽ Hotte 🔥</span>
                <span>⊞ Fenêtre — glisser ↔</span>
                <span>◼ Colonne — clic pour type</span>
                {Math.abs(diff)<=0.5 && cabs.length>0 && <span style={{color:'#1a7a3a',fontWeight:'bold'}}>✓ Calepinage correct · {wallLen}cm</span>}
              </div>
            </div>
          </div>

          {/* ── Modal Lead ── */}
          {showLeadModal && (
            <LeadModal
              onClose={() => setShowLeadModal(false)}
              quoteSummary={quoteSummary}
            />
          )}

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<KitchenDesigner />);
  </script>
</body>
</html>
