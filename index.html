    const getFacadeFill = (finish) => {

    // ====== UTILITAIRES ======
    const getColPositions = (wl, cfg) => {
      if (cfg === 'none') return [];
      if (cfg === 'A') return [0, wl - C.COL_W];
      if (cfg === 'B') return [wl - C.COL_W * 2, wl - C.COL_W];

      if (cfg === 'D') return [0];

      return [];

    const getCabRange = (wl, cfg) => {
      if (cfg === 'A') return [C.COL_W, wl - C.COL_W];

      if (cfg === 'C') return [C.COL_W * 2, wl];

        // Si c'est le dernier meuble, il prend exactement l'espace restant
        const isLast = rem < 60 || (rem >= 60 && rem % 60 !== 0 && rem - 60 < 15);
        const rawW = isLast ? rem : 60;
        const w = Math.min(rawW, 90);
        cabs.push({ id: id++, x, w, lowerType: 'rangement', upperMode: 'upper', upperType: 'rangement', hoodW: 60, hasPlaque: false });
        x += w;
      }
      return cabs;
    };
    const repackCabs = (cabs, start, extraColsObs=[]) => {
      // Trier les obstacles (colonnes extra) par position
      const obs = [...extraColsObs].sort((a,b) => a.x - b.x);
      let x = start;
      return cabs.map(c => {
        // Sauter par-dessus les colonnes extra qui se trouvent dans notre chemin
        let placed = false;
        while (!placed) {
          const blocking = obs.find(o => x >= o.x && x < o.x + o.w);
          if (blocking) {
            x = blocking.x + blocking.w;
          } else {
            placed = true;
          }
        }
        const nc = { ...c, x };
        x += c.w;
        return nc;
      });
    };
    const hasWinOverlap = (cab, wins) => wins.some(w => cab.x < w.pos + w.w && cab.x + cab.w > w.pos);

    // Découpe tout meuble > 90cm en tranches de 60/90cm
    const splitOversized = (cabs) => {
      const out = [];
      let nextId = Date.now();
      for (const c of cabs) {
        if (c.w <= 90) { out.push(c); continue; }
        let rem = c.w;
        let first = true;
        while (rem > 0) {
          const slice = rem > 90 ? (rem % 90 === 0 ? 90 : rem - Math.floor(rem/90)*90 >= 15 ? 90 : 60) : rem;
          out.push({...c, id: first ? c.id : nextId++, w: slice, lowerType:'rangement'});
          rem -= slice;
          first = false;
        }
      }
      return out;
    };
    const fixLowerType = (type, w, hasColFour, cabs, selfId) => {
      const t = LOWER_TYPES.find(t => t.id === type);
      if (!t) return 'rangement';
      if (t.widths && !t.widths.includes(w)) return 'rangement';
      if (t.noColFour && hasColFour) return 'rangement';
      if (t.unique && cabs.some(c => c.id !== selfId && c.lowerType === type)) return 'rangement';
      return type;
    };

    // ====== GRILLE TARIFAIRE ======
    const PRICING = {
      lower: {
        rangement:       { 45:143, 60:159, 90:221 },
        bouteille:       { 15:68,  30:98           },
        evier_1p:        { 45:152, 60:167          },
        rangement_2p:    { 80:195, 90:221          },
        evier_2p:        { 80:205, 90:232          },
        coulissant_4t:   { 30:340, 45:398, 60:429 },
        coulissant_2t1c: { 45:420, 60:465, 75:498, 90:530 },
        coulissant_2c:   { 45:398, 60:440, 75:472, 90:510 },
        tiroirs:     { 45:398, 60:429, 90:484 },
        evier:       { 45:152, 60:167, 90:226 },
        lv:          { 45:77,  60:83  },
        four:        { 60:133 },
        ll:          { 60:83  },
      },
      upper: {
        rangement: { 45:131, 60:143, 90:204 },
        vide:      { 45:0,   60:0,   90:0   },
        micro:     { 60:167 },
      },
      hood:   { 60:225, 90:257 },
      col: {
        colonne:     { 45:361, 60:400 },
        frigo:       { 60:385 },
        four:        { 60:361 },
        frigo_libre: { 60:0   },
      },
      worktop: { low: 140 },
    };

    const priceLookup = (table, w) => {
      if (!table) return 0;
      if (table[w] !== undefined) return table[w];
      const keys = Object.keys(table).map(Number).sort((a,b)=>a-b);
      if (!keys.length) return 0;
      return Math.round(table[keys[0]] * w / keys[0]);
    };

    const FINISH_COEFF = { melamine: 1.00, bois: 1.25, laque: 1.40 };

    const finishCoeff = (finish) => FINISH_COEFF[finish?.category] ?? 1.00;

    const calcPrice = ({ cabs, colCfg, colTypes, extraCols, wallLen, finishLower, finishUpper, finishCol, doorStyle }) => {
      const cLow = finishCoeff(finishLower);
      const cUp  = finishCoeff(finishUpper);
      const cCol = finishCoeff(finishCol);
      const cDoor = doorStyle === 'frame' ? 1.17 : 1.00;
      let lower = 0, upper = 0, cols = 0;
      cabs.forEach(function(c) {
        const lTable = PRICING.lower[c.lowerType] || PRICING.lower.rangement;
        lower += priceLookup(lTable, c.w);
        if (c.upperMode === 'upper') {
          const uTable = PRICING.upper[c.upperType] || PRICING.upper.rangement;
          upper += priceLookup(uTable, c.w);
        } else if (c.upperMode === 'hood') {
          upper += priceLookup(PRICING.hood, c.hoodW || 60);
        }
      });
      getColPositions(wallLen, colCfg).forEach(function(_, i) {
        const ct = (colTypes && colTypes[i]) || 'colonne';
        const tbl = PRICING.col[ct] || PRICING.col.colonne;
        cols += priceLookup(tbl, C.COL_W);
      });
      extraCols.forEach(function(ec) {
        const tbl = PRICING.col[ec.colType] || PRICING.col.colonne;
        cols += priceLookup(tbl, ec.w || C.COL_W);
      });
      lower = Math.round(lower * cLow * cDoor);
      upper = Math.round(upper * cUp  * cDoor);
      cols  = Math.round(cols  * cCol * cDoor);
      const totalLowerW = cabs.reduce((s, c) => s + c.w, 0) / 100;
      const worktop = Math.round(totalLowerW * PRICING.worktop.low);
      const subtotal = lower + upper + cols;
      return { lower, upper, cols, worktop, total: subtotal + worktop };
    };

    const fmt = function(n, locale) { const localeMap = {fr:'fr-FR',en:'en-GB',it:'it-IT',es:'es-ES',de:'de-DE'}; return n.toLocaleString(localeMap[locale]||'fr-FR') + ' €'; };

    // ====== COMPOSANTS SVG ======

    const Casserole = ({ cx, ctY, cw }) => {
      // Taille fixe indépendante de la largeur du meuble
      const panW  = 34;
      const panH  = 22;
      const panX  = cx - panW / 2;
      const panY  = ctY - panH;

      const lidH  = 4;
      const lidY  = panY - lidH;
      const knobW = 6, knobH = 3;
      const knobX = cx - knobW / 2;
      const knobY = lidY - knobH;

      const hW = 12, hH = 4;
      const hY = panY + panH * 0.35;

      return (
        <g>
          <rect x={panX} y={panY} width={panW} height={panH} rx={0.8}
            fill="#d0d0d0" stroke="#666" strokeWidth={0.8}/>
          <rect x={panX+3} y={panY+3} width={3} height={panH-6} rx={1}
            fill="white" opacity={0.18}/>
          <rect x={panX-2} y={lidY} width={panW+4} height={lidH} rx={1}
            fill="#c0c0c0" stroke="#666" strokeWidth={0.7}/>
          <rect x={knobX} y={knobY} width={knobW} height={knobH} rx={1.2}
            fill="#aaa" stroke="#666" strokeWidth={0.6}/>
          <rect x={panX-hW} y={hY} width={hW} height={hH} rx={2}
            fill="#888" stroke="#555" strokeWidth={0.6}/>
          <rect x={panX+panW} y={hY} width={hW} height={hH} rx={2}
            fill="#888" stroke="#555" strokeWidth={0.6}/>
        </g>
      );
    };

    const Mitigeur = ({ cx, ctY }) => {
      // Source bbox dans le dessin de référence (viewBox 340×560) :
      // x: 52..286 (w=234), y: 42..514 (h=472)
      // On scale pour tenir en ~15px large × 32px haut
      const s = 0.062;
      const tx = cx - 169 * s;
      const ty = ctY - 514 * s;
      return (
        <g transform={`translate(${tx},${ty}) scale(${s})`}>
          {/* BASE */}
          <rect x={62} y={490} width={120} height={24} rx={1} fill="#f5f5f5" stroke="#222" strokeWidth={0.7/s}/>
          {/* CORPS */}
          <rect x={52} y={375} width={140} height={118} rx={1} fill="#f5f5f5" stroke="#222" strokeWidth={0.7/s}/>
          {/* ÉPAULEMENT */}
          <line x1={52}  y1={375} x2={82}  y2={310} stroke="#222" strokeWidth={0.7/s}/>
          <line x1={192} y1={375} x2={132} y2={310} stroke="#222" strokeWidth={0.7/s}/>
          <line x1={82}  y1={310} x2={132} y2={310} stroke="#222" strokeWidth={0.7/s}/>
          {/* COL */}
          <rect x={82} y={52} width={50} height={258} rx={1} fill="#f5f5f5" stroke="#222" strokeWidth={0.7/s}/>
          {/* SORTIE EAU */}
          <rect x={82} y={42} width={50} height={26} rx={1} fill="#f5f5f5" stroke="#222" strokeWidth={0.7/s}/>
          <ellipse cx={107} cy={55} rx={18} ry={10} fill="#1a1a1a" stroke="#222" strokeWidth={0.7/s}/>
          <ellipse cx={107} cy={55} rx={11} ry={6} fill="#333"/>
          {/* BRAS LEVIER */}
          <line x1={192} y1={390} x2={252} y2={372} stroke="#222" strokeWidth={0.7/s}/>
          <line x1={192} y1={436} x2={232} y2={440} stroke="#222" strokeWidth={0.7/s}/>
          <line x1={252} y1={372} x2={232} y2={440} stroke="#222" strokeWidth={0.7/s}/>
          <line x1={192} y1={390} x2={192} y2={436} stroke="#222" strokeWidth={0.7/s}/>
          {/* KNOB */}
          <circle cx={256} cy={406} r={30} fill="#f5f5f5" stroke="#222" strokeWidth={0.7/s}/>
          {/* TIGE */}
          <rect x={253} y={378} width={6} height={20} rx={3} fill="#222" stroke="#222" strokeWidth={0.3/s}/>
        </g>
      );
    };

    // ── COMPOSANTS SVG INLINE (remplacement des images externes) ──

    const InlineColonne = ({ x, y, w, h }) => {
      const fi = 4, mid = y + h * 0.52;
      const hW = w * 0.32, hH = 2;
      return (
        <g>
          <line x1={x+fi} y1={mid} x2={x+w-fi} y2={mid} stroke="#bbb" strokeWidth={0.7}/>
          <rect x={x+fi} y={y+fi} width={w-fi*2} height={mid-y-fi*1.5} rx={0.5} fill="none" stroke="#bbb" strokeWidth={0.5}/>
          {/* poignée porte HAUTE → en bas de la porte */}
          <rect x={x+w/2-hW/2} y={mid-fi*0.75-hH-3} width={hW} height={hH} rx={1} fill="#aaa" stroke="#888" strokeWidth={0.4}/>
          <rect x={x+fi} y={mid+fi*0.5} width={w-fi*2} height={h-mid+y-fi*1.5} rx={0.5} fill="none" stroke="#bbb" strokeWidth={0.5}/>
          {/* poignée porte BASSE → en haut de la porte */}
          <rect x={x+w/2-hW/2} y={mid+fi*0.5+4} width={hW} height={hH} rx={1} fill="#aaa" stroke="#888" strokeWidth={0.4}/>
        </g>
      );
    };

    const InlineFrigo = ({ x, y, w, h }) => {
      const fridgeH = Math.round(h * 0.67);
      const fzH    = h - fridgeH;
      const sepY   = y + fridgeH;
      const cx     = x + w / 2;
      const fy     = sepY + fzH / 2 + 3; // centre de la petite porte
      return (
        <g>
          <line x1={x+2} y1={sepY} x2={x+w-2} y2={sepY} stroke="#7a9acc" strokeWidth={1}/>
          {/* Grande porte haut */}
          <rect x={x+3} y={y+3} width={w-6} height={fridgeH-4} rx={0.5} fill="none" stroke="#7a9acc" strokeWidth={0.5}/>
          {/* Petite porte bas = congélateur */}
          <rect x={x+3} y={sepY+2} width={w-6} height={fzH-5} rx={0.5} fill="none" stroke="#7a9acc" strokeWidth={0.5}/>
          {/* ❄ même symbole que le bouton menu */}
          <text x={cx} y={fy} textAnchor="middle" fontSize={10} fill="#7a9acc" fontFamily="Arial, sans-serif">❄</text>
          {[0,1,2].map(i => <line key={i} x1={x+10+i*9} y1={y+h-8} x2={x+10+i*9} y2={y+h-4} stroke="#7a9acc" strokeWidth={0.7}/>)}
        </g>
      );
    };

    const InlineFourColonne = ({ x, y, w, h }) => {
      // Four: bas à 80cm du sol → bottom = y + h - 80, hauteur four = 60px (proportions MB four)
      const ovenBot = y + h - 80;
      const ovenH   = 60;
      const ovenTop = ovenBot - ovenH;    // y + h - 140
      const bandeauH = 14;
      const doorY   = ovenTop + bandeauH;
      const glassH  = ovenH - bandeauH - 8;
      const cx = x + w / 2;
      const ox = x + 3, ow = w - 6;
      return (
        <g>
          {/* Rangement haut: poignée en BAS de la porte */}
          <rect x={x+4} y={y+4} width={w-8} height={ovenTop-y-8} rx={0.5} fill="none" stroke="#bbb" strokeWidth={0.5}/>
          <rect x={cx-12} y={ovenTop-y > 14 ? ovenTop-12 : y+(ovenTop-y)/2} width={24} height={2} rx={1} fill="#aaa" stroke="#888" strokeWidth={0.3}/>
          <line x1={x} y1={ovenTop-2} x2={x+w} y2={ovenTop-2} stroke="#888" strokeWidth={0.8}/>
          {/* Corps four */}
          <rect x={ox} y={ovenTop} width={ow} height={ovenH} rx={1} fill="#f2f2f2" stroke="#666" strokeWidth={0.7}/>
          {/* Bandeau commandes */}
          <rect x={ox} y={ovenTop} width={ow} height={bandeauH} rx={0.5} fill="#d8d4c8" stroke="#888" strokeWidth={0.5}/>
          {[ox+8, cx, ox+ow-8].map((kx,i) => (
            <g key={i}>
              <circle cx={kx} cy={ovenTop+7} r={3} fill="#ccc" stroke="#888" strokeWidth={0.5}/>
              <circle cx={kx} cy={ovenTop+7} r={1.2} fill="#aaa"/>
            </g>
          ))}
          {/* Poignée CENTRÉE */}
          <rect x={cx-14} y={doorY+2} width={28} height={2.5} rx={1.2} fill="#bbb" stroke="#888" strokeWidth={0.4}/>
          {/* Vitre */}
          <rect x={ox+2} y={doorY+6} width={ow-4} height={glassH} rx={0.5} fill="#1a1a2e" opacity={0.85} stroke="#444" strokeWidth={0.5}/>
          <line x1={ox+5} y1={doorY+8} x2={ox+9} y2={doorY+glassH+4} stroke="white" strokeWidth={1.5} opacity={0.07}/>
          <line x1={x} y1={ovenBot+2} x2={x+w} y2={ovenBot+2} stroke="#888" strokeWidth={0.8}/>
          {/* Rangement bas: poignée en HAUT de la porte */}
          <rect x={x+4} y={ovenBot+5} width={w-8} height={y+h-ovenBot-9} rx={0.5} fill="none" stroke="#bbb" strokeWidth={0.5}/>
          <rect x={cx-12} y={ovenBot+8} width={24} height={2} rx={1} fill="#aaa" stroke="#888" strokeWidth={0.3}/>
        </g>
      );
    };

    const InlineFrigoLibre = ({ x, y, w, h }) => {
      const fh = Math.round(h * 180 / 215);
      const fy = y + h - fh;
      const cx = x + w / 2;
      return (
        <g>
          <rect x={x} y={fy} width={w} height={fh} rx={4} fill="white" stroke="#333" strokeWidth={1.5}/>
          <rect x={x+3} y={fy+3} width={w-6} height={fh-10} rx={3} fill="none" stroke="#ccc" strokeWidth={0.5}/>
          <line x1={x+4} y1={fy+fh*0.34} x2={x+w-4} y2={fy+fh*0.34} stroke="#ccc" strokeWidth={0.5}/>
          <text x={cx} y={fy+fh*0.6} textAnchor="middle" fontSize={14} fill="#7a9acc" fontFamily="Arial, sans-serif">❄</text>
          {[0,1,2,3,4].map(i => <line key={i} x1={x+6+i*9} y1={y+h-8} x2={x+6+i*9} y2={y+h-4} stroke="#888" strokeWidth={0.7}/>)}
        </g>
      );
    };

    const InlineCapot = ({ x, y, w, h }) => {
      const bxOff = w * 0.14;
      const pts = `${x+bxOff},${y} ${x+w-bxOff},${y} ${x+w-1},${y+h} ${x+1},${y+h}`;
      return (
        <g>
          <polygon points={pts} fill="#e4e4e4" stroke="#555" strokeWidth={0.7}/>
          {[0.3, 0.5, 0.7].map((r, i) => {
            const lw = w*(0.55 + r*0.28), lx = x+(w-lw)/2, ly = y+h*r;
            return <line key={i} x1={lx} y1={ly} x2={lx+lw} y2={ly} stroke="#bbb" strokeWidth={0.4}/>;
          })}
          <rect x={x+5} y={y+h-7} width={w-10} height={4} rx={0.5} fill="#ffffdd" stroke="#bbb" strokeWidth={0.3}/>
          <circle cx={x+w*0.82} cy={y+h*0.15} r={3.5} fill="#ccc" stroke="#888" strokeWidth={0.4}/>
          <circle cx={x+w*0.82} cy={y+h*0.15} r={1.5} fill="#aaa"/>
        </g>
      );
    };

    const ColSvg = React.memo(({ xPos, doorStyle, idx, isLeft, colType, onClick, selected, colFill='#f2f2f2' }) => {
      const x = xPos + C.MARGIN, y = COL_TOP_Y, w = C.COL_W;
      const type = colType || 'colonne';
      const clipId = `colclip${idx}`;

      // frigo_libre : descend jusqu'au sol, PAS de plinthe
      if (type === 'frigo_libre') {
        const h = C.COL_H;
        return (
          <g onClick={onClick} style={{ cursor: 'pointer' }}>
            <InlineFrigoLibre x={x} y={y} w={w} h={h}/>
            {isLeft
              ? <text x={x+w/2} y={y+h-10} textAnchor="middle" fontSize={8} fill="#888">←</text>
              : <text x={x+w/2} y={y+h-10} textAnchor="middle" fontSize={8} fill="#888">→</text>}
          </g>
        );
      }

      // Toutes les autres colonnes : corps réduit + plinthe commune
      const h       = C.COL_H - C.PLINTH_H;   // 205px
      const plinthY = svgY(C.PLINTH_H);         // y de la plinthe
      const selStr  = selected ? '#1a56cc' : '#333';
      const selW    = selected ? 2 : 1.5;

      return (
        <g onClick={onClick} style={{ cursor: 'pointer' }}>
          <defs><clipPath id={clipId}><rect x={x} y={y} width={w} height={h} /></clipPath></defs>
          {/* Corps colonne */}
          <rect x={x} y={y} width={w} height={h}
            fill={colFill}
            stroke={selStr} strokeWidth={selW} />
          {/* Plinthe — identique à la plinthe des meubles bas */}
          <rect x={x} y={plinthY} width={w} height={C.PLINTH_H}
            fill="#e0e0e0" stroke="#555" strokeWidth={0.8}/>
          {type === 'colonne' && <InlineColonne x={x} y={y} w={w} h={h}/>}
          {type === 'frigo'   && <InlineFrigo   x={x} y={y} w={w} h={h}/>}
          {type === 'four'    && <InlineFourColonne x={x} y={y} w={w} h={h}/>}
          {doorStyle==='frame' && type==='colonne' &&
            <rect x={x+5} y={y+5} width={w-10} height={h-10} fill="none" stroke="#888" strokeWidth={0.7} />}
          {isLeft
            ? <text x={x+w/2} y={y+h-10} textAnchor="middle" fontSize={8} fill="#888">←</text>
            : <text x={x+w/2} y={y+h-10} textAnchor="middle" fontSize={8} fill="#888">→</text>}
        </g>
      );
    });

    const WinSvg = ({ win, onDragStart, onResizeStart, onSelect, isDragging, isResizing, isSelected }) => {
      const x = win.pos + C.MARGIN;
      const yT = svgY(190), yB = svgY(93), h = yB - yT;
      const gripW = 6, gripH = 16;
      const active = isDragging || isResizing;
      return (
        <g>
          {/* Corps fenêtre — drag pour déplacer */}
          <g onMouseDown={e => { e.preventDefault(); onDragStart(win.id, win.pos, e); }}
             onTouchStart={e => { e.preventDefault(); onDragStart(win.id, win.pos, e.touches[0]); }}
             onClick={e => { e.stopPropagation(); onSelect(win.id); }}
             style={{ cursor: isDragging ? 'grabbing' : 'grab' }}>
            <rect x={x} y={yT} width={win.w} height={h}
              fill={active ? '#bbddff' : isSelected ? '#c8e0ff' : '#d6eaff'}
              stroke={active||isSelected ? '#3366cc' : '#7a9acc'}
              strokeWidth={active||isSelected ? 1.5 : 0.8} />
            <line x1={x} y1={yT+h/2} x2={x+win.w} y2={yT+h/2} stroke="#9ab" strokeWidth={0.5} />
            <line x1={x+win.w/2} y1={yT} x2={x+win.w/2} y2={yB} stroke="#9ab" strokeWidth={0.5} />
            <text x={x+8} y={yT+h/2+2} textAnchor="middle" fontSize={7} fill="#3366cc">◁</text>
            <text x={x+win.w-8} y={yT+h/2+2} textAnchor="middle" fontSize={7} fill="#3366cc">▷</text>
            <text x={x+win.w/2} y={yT-3} textAnchor="middle" fontSize={7} fill="#3366cc" fontFamily="Courier New, monospace">⊞ {win.w}cm · pos:{win.pos}cm</text>
          </g>
          {/* Poignée resize — bord droit, visible si sélectionnée */}
          {isSelected && (
            <g onMouseDown={e => { e.preventDefault(); onResizeStart(win.id, win.w, e); }}
               style={{ cursor: 'ew-resize' }}>
              <rect x={x+win.w-gripW/2} y={yT+(h-gripH)/2} width={gripW} height={gripH}
                rx={2} fill="#1a56cc" opacity={0.85}/>
              <line x1={x+win.w-gripW/2+2} y1={yT+(h-gripH)/2+4} x2={x+win.w-gripW/2+2} y2={yT+(h+gripH)/2-4} stroke="white" strokeWidth={1} opacity={0.7}/>
              <line x1={x+win.w+gripW/2-2} y1={yT+(h-gripH)/2+4} x2={x+win.w+gripW/2-2} y2={yT+(h+gripH)/2-4} stroke="white" strokeWidth={1} opacity={0.7}/>
            </g>
          )}
        </g>
      );
    };

    const LowerSvg = ({ cab, selected, onSelect, doorStyle, facadeFill='#fff', canSwapLeft, canSwapRight, onSwapLeft, onSwapRight }) => {
      const x = cab.x + C.MARGIN, y = svgY(C.LOWER_H);
      const cw = cab.w;
      const h  = C.LOWER_H - C.PLINTH_H;
      const isInvalid = cab.lowerType === 'bouteille' ? cw < 15 : cw < 30;
      const ctY = svgY(C.LOWER_H + C.COUNTER_H);
      const cx  = x + cw / 2;
      const cy  = y + h / 2;
      const arrowW = 10, arrowH = 14;

      return (
        <g onClick={e => { e.stopPropagation(); onSelect(e); }} style={{ cursor: 'pointer' }}>

          {/* Corps — fond + contour */}
          <rect x={x} y={y} width={cw} height={h}
            fill={isInvalid ? '#fff0ee' : selected ? '#eef3ff' : facadeFill}
            stroke={isInvalid ? '#cc3333' : selected ? '#1a56cc' : '#333'}
            strokeWidth={selected ? 2 : 1} />

          {/* ── RANGEMENT 1P + ÉVIER 1P (même visuel) ── */}
          {(cab.lowerType==='rangement' || cab.lowerType==='evier_1p' || !cab.lowerType || cab.lowerType==='') && !isInvalid && (() => {
            const twoD = cab.lowerType==='evier_1p' ? false : cw > 60;
            const py = y+4, ph = h-8;
            if (!twoD) {
              const pw = cw-6, hw = Math.min(cw*0.45, 20);
              return (<>
                <rect x={x+3} y={py} width={pw} height={ph} rx={0.5} fill="none" stroke="#c0c0c0" strokeWidth={0.5}/>
                {doorStyle==='frame' && <rect x={x+6} y={py+3} width={pw-6} height={ph-6} fill="none" stroke="#bbb" strokeWidth={0.4}/>}
                <rect x={cx-hw/2} y={py+5} width={hw} height={2} rx={1} fill="#aaa" stroke="#888" strokeWidth={0.4}/>
              </>);
            } else {
              const sep = x+cw/2, pw = cw/2-5, hw = Math.min(cw/2*0.45, 18);
              return (<>
                <line x1={sep} y1={y+1} x2={sep} y2={y+h-1} stroke="#ccc" strokeWidth={0.5}/>
                <rect x={x+3}   y={py} width={pw} height={ph} rx={0.5} fill="none" stroke="#c0c0c0" strokeWidth={0.5}/>
                <rect x={sep+2} y={py} width={pw} height={ph} rx={0.5} fill="none" stroke="#c0c0c0" strokeWidth={0.5}/>
                {doorStyle==='frame' && <>
                  <rect x={x+6}   y={py+3} width={pw-6} height={ph-6} fill="none" stroke="#bbb" strokeWidth={0.4}/>
                  <rect x={sep+5} y={py+3} width={pw-6} height={ph-6} fill="none" stroke="#bbb" strokeWidth={0.4}/>
                </>}
                <rect x={x+cw/4-hw/2}   y={py+5} width={hw} height={2} rx={1} fill="#aaa" stroke="#888" strokeWidth={0.4}/>
                <rect x={x+3*cw/4-hw/2} y={py+5} width={hw} height={2} rx={1} fill="#aaa" stroke="#888" strokeWidth={0.4}/>
              </>);
            }
          })()}

          {/* ── TIROIRS ── */}
          {cab.lowerType==='tiroirs' && (() => {
            const dh = h/3, hw = Math.min(cw*0.4, 20);
            return [0,1,2].map(i => (
              <g key={i}>
                {i>0 && <line x1={x} y1={y+i*dh} x2={x+cw} y2={y+i*dh} stroke="#333" strokeWidth={0.8}/>}
                <rect x={x+3} y={y+i*dh+2} width={cw-6} height={dh-4} rx={0.5} fill="none" stroke="#d0d0d0" strokeWidth={0.5}/>
                <rect x={cx-hw/2} y={y+i*dh+5} width={hw} height={2} rx={1} fill="#aaa" stroke="#888" strokeWidth={0.4}/>
              </g>
            ));
          })()}

          {/* ── ÉVIER (images conservées) ── */}
          {/* ── ÉVIER (corps = rangement + mitigeur) ── */}
          {cab.lowerType==='evier' && !isInvalid && (() => {
            const twoD = cw > 60;
            const py = y+4, ph = h-8;
            if (!twoD) {
              const pw = cw-6, hw = Math.min(cw*0.45, 20);
              return (<>
                <rect x={x+3} y={py} width={pw} height={ph} rx={0.5} fill="none" stroke="#c0c0c0" strokeWidth={0.5}/>
                {doorStyle==='frame' && <rect x={x+6} y={py+3} width={pw-6} height={ph-6} fill="none" stroke="#bbb" strokeWidth={0.4}/>}
                <rect x={cx-hw/2} y={py+5} width={hw} height={2} rx={1} fill="#aaa" stroke="#888" strokeWidth={0.4}/>
              </>);
            } else {
              const sep = x+cw/2, pw = cw/2-5, hw = Math.min(cw/2*0.45, 18);
              return (<>
                <line x1={sep} y1={y+1} x2={sep} y2={y+h-1} stroke="#ccc" strokeWidth={0.5}/>
                <rect x={x+3}   y={py} width={pw} height={ph} rx={0.5} fill="none" stroke="#c0c0c0" strokeWidth={0.5}/>
                <rect x={sep+2} y={py} width={pw} height={ph} rx={0.5} fill="none" stroke="#c0c0c0" strokeWidth={0.5}/>
                {doorStyle==='frame' && <>
                  <rect x={x+6}   y={py+3} width={pw-6} height={ph-6} fill="none" stroke="#bbb" strokeWidth={0.4}/>
                  <rect x={sep+5} y={py+3} width={pw-6} height={ph-6} fill="none" stroke="#bbb" strokeWidth={0.4}/>
                </>}
                <rect x={x+cw/4-hw/2}   y={py+5} width={hw} height={2} rx={1} fill="#aaa" stroke="#888" strokeWidth={0.4}/>
                <rect x={x+3*cw/4-hw/2} y={py+5} width={hw} height={2} rx={1} fill="#aaa" stroke="#888" strokeWidth={0.4}/>
              </>);
            }
          })()}
          {(cab.lowerType==='evier' || cab.lowerType==='evier_1p') && <Mitigeur cx={cx} ctY={ctY} />}

          {/* ── FOUR ── */}
          {cab.lowerType==='four' && (() => {
            const px=x+3, pw=cw-6, bh=14, doorY=y+20, doorH=h-28, glassH=doorH-8;
            return (<>
              <rect x={px} y={y+3} width={pw} height={h-6} rx={1} fill="#f2f2f2" stroke="#555" strokeWidth={0.8}/>
              <rect x={px} y={y+3} width={pw} height={bh} rx={1} fill="#e0dcd0" stroke="#555" strokeWidth={0.6}/>
              {[px+8, cx, px+pw-8].map((kx,i) => (<g key={i}>
                <circle cx={kx} cy={y+10} r={3} fill="#ccc" stroke="#888" strokeWidth={0.5}/>
                <circle cx={kx} cy={y+10} r={1.2} fill="#aaa"/>
              </g>))}
              <rect x={px+2} y={doorY} width={pw-4} height={doorH} rx={0.5} fill="#e8e8e8" stroke="#666" strokeWidth={0.6}/>
              <rect x={px+5} y={doorY+3} width={pw-10} height={glassH} rx={0.5} fill="#1a1a2e" opacity={0.85} stroke="#444" strokeWidth={0.4}/>
              <line x1={px+7} y1={doorY+5} x2={px+11} y2={doorY+glassH-2} stroke="white" strokeWidth={1.5} opacity={0.07}/>
              <rect x={cx-16} y={doorY+3} width={32} height={2.5} rx={1.2} fill="#bbb" stroke="#888" strokeWidth={0.4}/>
            </>);
          })()}

          {/* ── LAVE-VAISSELLE ── */}
          {cab.lowerType==='lv' && (() => {
            const px=x+3, pw=cw-6;
            const banH = 10;
            const doorY = y + 3 + banH;
            const doorH = h - 6 - banH;
            const hw = Math.min(pw*0.45, 24);
            const knCx = px + pw - 9;
            return (<>
              <rect x={px} y={y+3} width={pw} height={h-6} rx={1} fill="#f4f4f6" stroke="#555" strokeWidth={0.8}/>
              <rect x={px} y={y+3} width={pw} height={banH} rx={1} fill="#e0e2e8" stroke="#555" strokeWidth={0.6}/>
              <circle cx={px+7} cy={y+3+banH/2} r={1.8} fill="#aaddaa" stroke="#888" strokeWidth={0.3}/>
              <circle cx={knCx} cy={y+3+banH/2} r={banH*0.38} fill="#d0d0d8" stroke="#888" strokeWidth={0.5}/>
              <circle cx={knCx} cy={y+3+banH/2} r={banH*0.15} fill="#aaa"/>
              <line x1={knCx} y1={y+3} x2={knCx} y2={y+3+banH*0.35} stroke="#666" strokeWidth={0.7}/>
              <rect x={px+1} y={doorY} width={pw-2} height={doorH} rx={0.5}
                fill={facadeFill} stroke="#777" strokeWidth={0.5}/>
              {doorStyle==='frame' && <rect x={px+4} y={doorY+3} width={pw-8} height={doorH-6}
                rx={0.5} fill="none" stroke="#bbb" strokeWidth={0.4}/>}
              <rect x={cx-hw/2} y={doorY+5} width={hw} height={2} rx={1} fill="#bbb" stroke="#888" strokeWidth={0.4}/>
            </>);
          })()}

          {/* ── LAVE-LINGE ── */}
          {cab.lowerType==='ll' && (() => {
            const px=x+3, pw=cw-6;
            const banH = 10;
            const doorY = y + 3 + banH;
            const doorH = h - 6 - banH;
            const hw = Math.min(pw*0.45, 24);
            const hubCx = cx, hubCy = doorY + doorH/2;
            const hubR = Math.min(pw/2-8, doorH/2-8);
            const kL=px+8, kR=px+pw-8;
            // stroke hublot adapté à la finition
            const hubStroke = (facadeFill && facadeFill.startsWith('url')) ? '#7a5228' : '#888';
            return (<>
              {/* Corps fond */}
              <rect x={px} y={y+3} width={pw} height={h-6} rx={1} fill="#f4f4f6" stroke="#555" strokeWidth={0.8}/>
              {/* Bandeau commandes */}
              <rect x={px} y={y+3} width={pw} height={banH} rx={1} fill="#e0e2e8" stroke="#555" strokeWidth={0.6}/>
              <circle cx={kL} cy={y+3+banH/2} r={banH*0.38} fill="#d0d0d8" stroke="#888" strokeWidth={0.5}/>
              <circle cx={kL} cy={y+3+banH/2} r={banH*0.15} fill="#aaa"/>
              <line x1={kL} y1={y+3} x2={kL} y2={y+3+banH*0.35} stroke="#666" strokeWidth={0.7}/>
              <rect x={cx-8} y={y+4} width={16} height={banH-3} rx={0.8} fill="#1a2a1a" stroke="#555" strokeWidth={0.3}/>
              <text x={cx} y={y+3+banH*0.72} textAnchor="middle" fontSize={4.5} fill="#66cc66" fontFamily="Courier New, monospace">40°</text>
              <circle cx={kR} cy={y+3+banH/2} r={banH*0.38} fill="#d0d0d8" stroke="#888" strokeWidth={0.5}/>
              <circle cx={kR} cy={y+3+banH/2} r={banH*0.15} fill="#aaa"/>
              <line x1={kR} y1={y+3} x2={kR} y2={y+3+banH*0.35} stroke="#666" strokeWidth={0.7}/>
              {/* Porte — colorable */}
              <rect x={px+1} y={doorY} width={pw-2} height={doorH} rx={0.5}
                fill={facadeFill} stroke="#777" strokeWidth={0.5}/>
              {doorStyle==='frame' && <rect x={px+4} y={doorY+3} width={pw-8} height={doorH-6}
                rx={0.5} fill="none" stroke="#bbb" strokeWidth={0.4}/>}
              {/* Poignée centrée en haut de porte */}
              <rect x={cx-hw/2} y={doorY+5} width={hw} height={2} rx={1} fill="#bbb" stroke="#888" strokeWidth={0.4}/>
              {/* Hublot — 3 cercles au trait transparent */}
              <circle cx={hubCx} cy={hubCy} r={hubR} fill="none" stroke={hubStroke} strokeWidth={1.8}/>
              <circle cx={hubCx} cy={hubCy} r={hubR*0.86} fill="none" stroke={hubStroke} strokeWidth={0.7} opacity={0.6}/>
              <circle cx={hubCx} cy={hubCy} r={hubR*0.7} fill="none" stroke={hubStroke} strokeWidth={1.2} opacity={0.5}/>
              {/* Reflet verre */}
              <ellipse cx={hubCx-hubR*0.28} cy={hubCy-hubR*0.28}
                rx={hubR*0.22} ry={hubR*0.13}
                fill="white" opacity={0.32}
                transform={`rotate(-30,${hubCx-hubR*0.28},${hubCy-hubR*0.28})`}/>
            </>);
          })()}

          {/* ── FOUR PLAQUE (legacy) ── */}
          {cab.lowerType==='four_plaque' && (() => {
            const px=x+4, pw=cw-8, oY=y+6, oH=h-12;
            return (<>
              <rect x={px} y={oY} width={pw} height={oH} fill="#f2f2f2" stroke="#666" strokeWidth={0.7}/>
              <rect x={px+3} y={oY+3} width={pw-6} height={oH-6} fill="none" stroke="#bbb" strokeWidth={0.4}/>
              <text x={cx} y={oY+oH/2+2.5} textAnchor="middle" fontSize={5.5} fill="#555" fontFamily="monospace">FOUR</text>
            </>);
          })()}

          {/* ── BOUTEILLE (A·15cm / 30cm) — même visuel que rangement 1 porte ── */}
          {cab.lowerType==='bouteille' && !isInvalid && (() => {
            const py = y+4, ph = h-8, pw = cw-6;
            const hw = Math.min(cw*0.45, 20);
            return (<>
              <rect x={x+3} y={py} width={pw} height={ph} rx={0.5} fill="none" stroke="#c0c0c0" strokeWidth={0.5}/>
              {doorStyle==='frame' && <rect x={x+6} y={py+3} width={pw-6} height={ph-6} fill="none" stroke="#bbb" strokeWidth={0.4}/>}
              <rect x={cx-hw/2} y={py+5} width={hw} height={2} rx={1} fill="#aaa" stroke="#888" strokeWidth={0.4}/>
            </>);
          })()}

          {/* ── RANGEMENT 2P + ÉVIER 2P (même visuel 2 portes) ── */}
          {(cab.lowerType==='rangement_2p' || cab.lowerType==='evier_2p') && !isInvalid && (() => {
            const py = y+4, ph = h-8;
            const sep = x+cw/2, pw = cw/2-5, hw = Math.min(cw/2*0.45, 18);
            return (<>
              <line x1={sep} y1={y+1} x2={sep} y2={y+h-1} stroke="#ccc" strokeWidth={0.5}/>
              <rect x={x+3}   y={py} width={pw} height={ph} rx={0.5} fill="none" stroke="#c0c0c0" strokeWidth={0.5}/>
              <rect x={sep+2} y={py} width={pw} height={ph} rx={0.5} fill="none" stroke="#c0c0c0" strokeWidth={0.5}/>
              {doorStyle==='frame' && <>
                <rect x={x+6}   y={py+3} width={pw-6} height={ph-6} fill="none" stroke="#bbb" strokeWidth={0.4}/>
                <rect x={sep+5} y={py+3} width={pw-6} height={ph-6} fill="none" stroke="#bbb" strokeWidth={0.4}/>
              </>}
              <rect x={x+cw/4-hw/2}   y={py+5} width={hw} height={2} rx={1} fill="#aaa" stroke="#888" strokeWidth={0.4}/>
              <rect x={x+3*cw/4-hw/2} y={py+5} width={hw} height={2} rx={1} fill="#aaa" stroke="#888" strokeWidth={0.4}/>
            </>);
          })()}
          {cab.lowerType==='evier_2p' && <Mitigeur cx={cx} ctY={ctY}/>}

          {/* ── COULISSANT 4 TIROIRS (C) ── */}
          {cab.lowerType==='coulissant_4t' && !isInvalid && (() => {
            const dh = h/4, hw = Math.min(cw*0.38, 20);
            return (<>
              {[0,1,2,3].map(i => (
                <g key={i}>
                  {i>0 && <line x1={x+1} y1={y+i*dh} x2={x+cw-1} y2={y+i*dh} stroke="#555" strokeWidth={0.8}/>}
                  <rect x={x+3} y={y+i*dh+2} width={cw-6} height={dh-4} rx={0.5}
                    fill="none" stroke="#c8c8c8" strokeWidth={0.5}/>
                  <rect x={cx-hw/2} y={y+i*dh+6} width={hw} height={2} rx={1}
                    fill="#aaa" stroke="#888" strokeWidth={0.4}/>
                </g>
              ))}
            </>);
          })()}

          {/* ── COULISSANT 2 TIROIRS + 1 COFFRE (D) ── */}
          {cab.lowerType==='coulissant_2t1c' && !isInvalid && (() => {
            const th = Math.round(h*0.22), ch = h-2*th;
            const hw = Math.min(cw*0.38, 22);
            return (<>
              {[0,1].map(i => (
                <g key={i}>
                  {i>0 && <line x1={x+1} y1={y+i*th} x2={x+cw-1} y2={y+i*th} stroke="#555" strokeWidth={0.7}/>}
                  <rect x={x+3} y={y+i*th+2} width={cw-6} height={th-4} rx={0.5}
                    fill="none" stroke="#c8c8c8" strokeWidth={0.5}/>
                  <rect x={cx-hw/2} y={y+i*th+6} width={hw} height={1.8} rx={0.9}
                    fill="#aaa" stroke="#888" strokeWidth={0.3}/>
                </g>
              ))}
              <line x1={x+1} y1={y+2*th} x2={x+cw-1} y2={y+2*th} stroke="#444" strokeWidth={1.2}/>
              <rect x={x+3} y={y+2*th+3} width={cw-6} height={ch-6} rx={0.5}
                fill="none" stroke="#c8c8c8" strokeWidth={0.6}/>
              <rect x={cx-hw/2} y={y+2*th+8} width={hw} height={2.5} rx={1.2}
                fill="#aaa" stroke="#888" strokeWidth={0.4}/>
            </>);
          })()}

          {/* ── COULISSANT 2 COFFRES (E) ── */}
          {cab.lowerType==='coulissant_2c' && !isInvalid && (() => {
            const ch = h/2, hw = Math.min(cw*0.38, 22);
            return (<>
              {[0,1].map(i => (
                <g key={i}>
                  {i>0 && <line x1={x+1} y1={y+i*ch} x2={x+cw-1} y2={y+i*ch} stroke="#444" strokeWidth={1.2}/>}
                  <rect x={x+3} y={y+i*ch+3} width={cw-6} height={ch-6} rx={0.5}
                    fill="none" stroke="#c8c8c8" strokeWidth={0.6}/>
                  <rect x={cx-hw/2} y={y+i*ch+8} width={hw} height={2.5} rx={1.2}
                    fill="#aaa" stroke="#888" strokeWidth={0.4}/>
                </g>
              ))}
            </>);
          })()}

          {/* Label largeur */}
          <text x={cx} y={y+h-4} textAnchor="middle" fontSize={6} fill="#999" fontFamily="Courier New, monospace">{cw}cm</text>

          {/* Plan de travail */}
          <rect x={x} y={ctY} width={cw} height={C.COUNTER_H} fill="#222" stroke="#111" strokeWidth={0.4}/>

          {/* Plaque de cuisson */}
          {cab.hasPlaque && <Casserole cx={cx} ctY={ctY} cw={cw}/>}

          {/* Flèches swap — visibles uniquement si sélectionné */}
          {selected && (<>
            {canSwapLeft && (
              <g onClick={e => { e.stopPropagation(); onSwapLeft(); }} style={{cursor:'pointer'}}>
                <rect x={x+1} y={cy-arrowH/2} width={arrowW} height={arrowH}
                  rx={2} fill="#1a56cc" opacity={0.85}/>
                <text x={x+1+arrowW/2} y={cy+3.5} textAnchor="middle"
                  fontSize={9} fill="white" fontFamily="monospace" style={{pointerEvents:'none'}}>◀</text>
              </g>
            )}
            {canSwapRight && (
              <g onClick={e => { e.stopPropagation(); onSwapRight(); }} style={{cursor:'pointer'}}>
                <rect x={x+cw-arrowW-1} y={cy-arrowH/2} width={arrowW} height={arrowH}
                  rx={2} fill="#1a56cc" opacity={0.85}/>
                <text x={x+cw-arrowW/2-1} y={cy+3.5} textAnchor="middle"
                  fontSize={9} fill="white" fontFamily="monospace" style={{pointerEvents:'none'}}>▶</text>
              </g>
            )}
          </>)}

        </g>
      );
    };

    const UpperSvg = ({ cab, doorStyle, wins, selected, onSelect, facadeFill='#fff' }) => {
      const { x, w: cw, upperMode, upperType, hoodW } = cab;
      const xPos = x + C.MARGIN;
      const y = svgY(C.UPPER_FROM + C.UPPER_H), h = C.UPPER_H, fi = 4;
      const selStroke = selected ? '#1a56cc' : '#333';
      const selWidth  = selected ? 2 : 1;

      if (hasWinOverlap(cab, wins)) return (
        <g onClick={e => { e.stopPropagation(); onSelect(); }} style={{ cursor: 'pointer' }}>
          <rect x={xPos} y={y} width={cw} height={h} fill="none" stroke="#ccc" strokeWidth={0.4} strokeDasharray="2,3" />
          <text x={xPos+cw/2} y={y+h/2+2} textAnchor="middle" fontSize={5.5} fill="#aaa" fontFamily="monospace">⊞</text>
        </g>
      );
      if (upperMode==='none') return (
        <g onClick={e => { e.stopPropagation(); onSelect(); }} style={{ cursor: 'pointer' }}>
          <rect x={xPos} y={y} width={cw} height={h}
            fill={selected ? '#eef3ff' : '#fafafa'}
            stroke={selected ? '#1a56cc' : '#ccc'}
            strokeWidth={selected ? 1.5 : 0.6} strokeDasharray="3,2" />
          <text x={xPos+cw/2} y={y+h/2+2} textAnchor="middle" fontSize={8} fill={selected ? '#1a56cc' : '#bbb'} fontFamily="monospace">∅</text>
        </g>
      );
      if (upperMode==='hood') {
        if (cw < 60) return (
          <g onClick={e => { e.stopPropagation(); onSelect(); }} style={{ cursor: 'pointer' }}>
            <rect x={xPos} y={y} width={cw} height={h} fill="#fafafa" stroke="#ccc" strokeWidth={0.6} strokeDasharray="3,2" />
            <text x={xPos+cw/2} y={y+h/2+2} textAnchor="middle" fontSize={8} fill="#bbb" fontFamily="monospace">∅</text>
          </g>
        );
        const yTop    = svgY(C.UPPER_FROM + C.UPPER_H);
        const yBot    = svgY(C.UPPER_FROM);
        const totalH  = yBot - yTop;
        // Image hotte : largeur = cw, hauteur proportionnelle (ratio 1087/964)
        const iW  = cw;
        const iH  = iW / (1102/951);
        const iX  = xPos;
        const iY  = yBot - iH;   // ancrée en bas
        return (
          <g onClick={e => { e.stopPropagation(); onSelect(); }} style={{ cursor: 'pointer' }}>
            {/* Fond meuble pleine hauteur */}
            <rect x={xPos} y={yTop} width={cw} height={totalH}
              fill={selected ? '#eef3ff' : facadeFill}
              stroke={selected ? '#1a56cc' : 'none'}
              strokeWidth={selected ? 1.5 : 0} />
            {/* Hotte inline */}
            <InlineCapot x={iX} y={iY} w={iW} h={iH}/>
          </g>
        );
      }
      return (
        <g onClick={e => { e.stopPropagation(); onSelect(); }} style={{ cursor: 'pointer' }}>
          <rect x={xPos} y={y} width={cw} height={h}
            fill={selected ? '#eef3ff' : facadeFill}
            stroke={selStroke} strokeWidth={selWidth} />
          {doorStyle==='frame' && <rect x={xPos+fi} y={y+fi} width={cw-fi*2} height={h-fi*2} fill="none" stroke="#777" strokeWidth={0.65} />}
          {upperType==='etageres' && [1,2].map(i =>
            <line key={i} x1={xPos+2} y1={y+h*i/3} x2={xPos+cw-2} y2={y+h*i/3} stroke="#bbb" strokeWidth={0.55} />)}
          {upperType==='mixte' && [0.5,0.75].map((r,i) =>
            <line key={i} x1={xPos+2} y1={y+h*r} x2={xPos+cw-2} y2={y+h*r} stroke="#bbb" strokeWidth={0.55} />)}
          {upperType==='vide' && <>
            <line x1={xPos+3} y1={y+3} x2={xPos+cw-3} y2={y+h-3} stroke="#ddd" strokeWidth={0.5} />
            <line x1={xPos+cw-3} y1={y+3} x2={xPos+3} y2={y+h-3} stroke="#ddd" strokeWidth={0.5} />
          </>}
          {upperType==='micro' && (() => {
            // MEUBLE HAUT MICRO-ONDE
            // Partie haute : rangement fermé (~45% hauteur)
            const topH  = h * 0.45;
            const topY  = y;
            // Micro-onde : partie basse (~55% hauteur)
            const moY   = y + topH;
            const moH   = h - topH;
            const mx    = xPos + 2, mw = cw - 4;
            // Séparation gauche (grille) / droite (commandes) : 65% / 35%
            const grW   = mw * 0.62, ctW = mw * 0.38;
            const grX   = mx, ctX = mx + grW;
            const nbLines = 9;
            // Commandes droite
            const dispW = ctW - 4, dispH = moH * 0.22;
            const dispX = ctX + 2, dispY = moY + 3;
            // 6 boutons (2 col × 3 rangées)
            const btnS  = Math.min((ctW - 8) / 2 - 1, (moH * 0.45) / 3 - 1);
            const btnX1 = ctX + 2, btnX2 = ctX + 2 + btnS + 2;
            const btnY0 = dispY + dispH + 3;
            // Bouton rectangulaire bas
            const longBtnY = btnY0 + 3 * (btnS + 2);
            return (<>
              {/* Séparateur rangement / micro */}
              <line x1={xPos+1} y1={moY} x2={xPos+cw-1} y2={moY} stroke="#555" strokeWidth={0.8}/>
              {/* Cadre micro-onde */}
              <rect x={mx} y={moY+1} width={mw} height={moH-2}
                fill="#f8f8f8" stroke="#333" strokeWidth={0.7}/>
              {/* Grille aération gauche */}
              {Array.from({length:nbLines},(_,i) => (
                <line key={i}
                  x1={grX+2} y1={moY + 3 + (moH-6)*(i+0.5)/nbLines}
                  x2={grX+grW-2} y2={moY + 3 + (moH-6)*(i+0.5)/nbLines}
                  stroke="#999" strokeWidth={0.55}/>
              ))}
              {/* Séparateur grille/commandes */}
              <line x1={ctX} y1={moY+2} x2={ctX} y2={moY+moH-2} stroke="#bbb" strokeWidth={0.5}/>
              {/* Afficheur digital */}
              <rect x={dispX} y={dispY} width={dispW} height={dispH}
                rx={1} fill="#e8efe8" stroke="#666" strokeWidth={0.5}/>
              <text x={dispX+dispW/2} y={dispY+dispH*0.75}
                textAnchor="middle" fontSize={dispH*0.7} fill="#333" fontFamily="monospace">38</text>
              {/* 6 boutons 2×3 */}
              {[0,1,2].map(row => [0,1].map(col => (
                <rect key={`${row}-${col}`}
                  x={col===0 ? btnX1 : btnX2} y={btnY0 + row*(btnS+2)}
                  width={btnS} height={btnS}
                  rx={0.5} fill="#e0e0e0" stroke="#888" strokeWidth={0.4}/>
              )))}
              {/* Bouton rectangulaire bas */}
              {longBtnY + btnS * 0.6 < moY + moH - 1 && (
                <rect x={btnX1} y={longBtnY} width={btnS*2+2} height={btnS*0.6}
                  rx={0.5} fill="#e0e0e0" stroke="#888" strokeWidth={0.4}/>
              )}
            </>);
          })()}
          {upperType!=='micro' && upperType!=='etageres' && upperType!=='mixte' && upperType!=='vide' && upperType!=='hood' && (() => {
            const hw = Math.min(cw * 0.38, 22);
            if (cw > 60) {
              const sep = xPos + cw / 2;
              const pw  = cw / 2 - 3;
              return (<>
                <line x1={sep} y1={y+1} x2={sep} y2={y+h-1} stroke="#ccc" strokeWidth={0.5}/>
                <rect x={xPos+2}   y={y+3} width={pw-1} height={h-6} rx={0.5} fill="none" stroke="#c0c0c0" strokeWidth={0.5}/>
                <rect x={sep+1}    y={y+3} width={pw-1} height={h-6} rx={0.5} fill="none" stroke="#c0c0c0" strokeWidth={0.5}/>
                <rect x={xPos+cw*0.25-hw/2} y={y+h-8} width={hw} height={2} rx={1} fill="#bbb" stroke="#888" strokeWidth={0.4}/>
                <rect x={xPos+cw*0.75-hw/2} y={y+h-8} width={hw} height={2} rx={1} fill="#bbb" stroke="#888" strokeWidth={0.4}/>
              </>);
            } else {
              return (<>
                <rect x={xPos+2} y={y+3} width={cw-4} height={h-6} rx={0.5} fill="none" stroke="#c0c0c0" strokeWidth={0.5}/>
                <rect x={xPos+cw/2-hw/2} y={y+h-8} width={hw} height={2} rx={1} fill="#bbb" stroke="#888" strokeWidth={0.4}/>
              </>);
            }
          })()}
        </g>
      );
    };

    // ====== RÉSUMÉ CONFIGURATION ======
    function buildQuoteSummary({ wallLen, colCfg, colTypes, extraCols, cabs, wins, doorStyle, price, finishLower, finishUpper, finishCol, T, locale }) {
      const colLabels  = { none:T('col.noneShort'), A:T('col.Ashort'), B:T('col.Bshort'), C:T('col.Cshort'), D:T('col.Dshort'), E:T('col.Eshort') };
      const typeLabels = { colonne:T('col.colonne'), frigo:T('col.frigo'), four:T('col.four'), frigo_libre:T('col.frigo_libre') };
      const lowerLabels = { rangement:T('lower.rangement'), bouteille:T('lower.bouteille'), evier_1p:T('lower.evier_1p'), rangement_2p:T('lower.rangement_2p'), evier_2p:T('lower.evier_2p'), coulissant_4t:T('lower.coulissant_4t'), coulissant_2t1c:T('lower.coulissant_2t1c'), coulissant_2c:T('lower.coulissant_2c'), tiroirs:'Tiroirs', evier:T('lower.evier'), lv:T('lower.lv'), four:T('lower.four'), ll:T('lower.ll') };
      const upperLabels = { rangement:T('upper.rangement'), vide:T('upper.vide'), micro:T('upper.micro') };
      const doorLabels  = { smooth:T('door.smooth'), frame:T('door.frame') };
      const finLabel = (f) => f.name + (f.category==='bois' ? ' — '+T('fin.cat.bois') : f.category==='laque' ? ' — '+T('fin.cat.laque') : ' — '+T('fin.cat.melamine'));

      const L = [];
      L.push('╔══════════════════════════════╗');
      L.push(T('quote.header'));
      L.push('╚══════════════════════════════╝');
      L.push('');

      // ── Implantation ──
      L.push(T('quote.layout'));
      L.push(T('quote.wallLen') + wallLen + ' cm');
      L.push(T('quote.columns') + (colLabels[colCfg] || colCfg));
      if (colCfg !== 'none') {
        const fixedColTypes = Object.values(colTypes).filter(Boolean);
        if (fixedColTypes.length)
          L.push(T('quote.colTypes') + fixedColTypes.map((t,i) => (i===0?T('quote.left'):T('quote.right')) + ' → ' + (typeLabels[t]||t)).join('  ·  '));
      }
      if (extraCols.length)
        L.push(T('quote.colsAdded') + extraCols.map(ec => (typeLabels[ec.colType]||ec.colType) + ' ' + ec.w + 'cm').join(', '));
      if (wins.length)
        L.push(T('quote.windows') + wins.map(w => w.w + 'cm (pos. ' + w.pos + 'cm)').join(', '));
      L.push(T('quote.doorStyle') + (doorLabels[doorStyle] || doorStyle));
      L.push('');

      // ── Finitions ──
      L.push(T('quote.finishes'));
      L.push(T('quote.lower') + finLabel(finishLower));
      L.push(T('quote.upper') + finLabel(finishUpper));
      L.push(T('quote.colsFin') + finLabel(finishCol));
      L.push('');

      // ── Modules ──
      L.push(T('quote.modules') + ' (' + cabs.length + ' ' + T('quote.lowerUnits') + ')');
      cabs.forEach((c, i) => {
        const lt = (lowerLabels[c.lowerType] || c.lowerType) + (c.hasPlaque ? T('quote.induction') : '');
        const ut = c.upperMode === 'upper' ? (upperLabels[c.upperType] || c.upperType) : c.upperMode === 'hood' ? T('quote.hood') : T('quote.noUpper');
        L.push('  ' + (i+1) + '.  ' + c.w + ' cm  —  ' + T('quote.bas') + ': ' + lt + '  |  ' + T('quote.haut') + ': ' + ut);
      });
      L.push('');

      // ── Budget ──
      if (price) {
        L.push(T('quote.budget'));
        L.push(T('quote.lower') + fmt(price.lower, locale) + ' €'.replace(' €',''));
        L.push(T('quote.upper') + fmt(price.upper, locale).replace(' €','') + ' €');
        if (price.cols > 0)
          L.push(T('quote.colsFin') + fmt(price.cols, locale).replace(' €','') + ' €');
        L.push(T('quote.worktop') + fmt(price.worktop, locale).replace(' €','') + ' €' + T('quote.worktopNote'));
        L.push(T('quote.sep'));
        L.push(T('quote.total') + fmt(price.total, locale).replace(' €','') + ' €');
        L.push('');
        L.push(T('quote.delivery'));
        L.push(T('quote.noElec'));
        L.push(T('quote.indicative'));
      }

      L.push('');
      L.push(T('quote.contact'));

      return L.join('\r\n');
    }

                  <div style={{background:'#fff3f3',border:'1px solid #f5c6cb',padding:'8px 12px',fontSize:'11px',color:'#c0392b',marginBottom:'12px'}}>

                <div style={{display:'flex',gap:'8px'}}>

                    Annuler
                  </button>
                  <div style={{flex:2}} onClick={()=>{if(!isValid)touchAll();}}>
                    <button onClick={send} disabled={!isValid || status==='sending'}
                      style={{width:'100%',padding:'10px',background:isValid?'#222':'#ccc',color:'#fff',border:'none',cursor:isValid?'pointer':'not-allowed',fontFamily:'Courier New,monospace',fontSize:'11px',letterSpacing:'2px',transition:'background 0.2s'}}>
                      {status==='sending' ? T('modal.sending') : T('modal.send')}
                    </button>
                  </div>
                </div>
              </>
            )}

        </div>
      );
