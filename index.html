    // ====== COMPOSANT PRINCIPAL ======
    function KitchenDesigner() {
      const [wallLen,        setWallLen]        = React.useState(360);
      const [sliderVal,      setSliderVal]      = React.useState(360);
      const [colCfg,         setColCfg]          = React.useState('A');
      const [colTypes,       setColTypes]        = React.useState(['colonne','colonne']);
      const [extraCols,      setExtraCols]       = React.useState([]);
      const [selectedExtraColId, setSelectedExtraColId] = React.useState(null);
      const [selectedColIdx, setSelectedColIdx]  = React.useState(null);
      const [wins,           setWins]            = React.useState([]);
      const [cabs,           setCabs]            = React.useState(() => genCabs(360,'A'));
      const [selLowerId,     setSelLowerId]      = React.useState(null);
      const [selUpperId,     setSelUpperId]      = React.useState(null);
      const [phase,          setPhase]           = React.useState('measure');
      const [doorStyle,      setDoorStyle]       = React.useState('smooth');
      const [showLeadModal,  setShowLeadModal]   = React.useState(false);
      const [winPos,         setWinPos]          = React.useState(150);
      const [winW,           setWinW]            = React.useState(90);
      const [winIdCounter,   setWinIdCounter]    = React.useState(0);
      const [draggingWin,    setDraggingWin]     = React.useState(null);
      const [resizingWin,    setResizingWin]     = React.useState(null);
      const [selectedWinId,  setSelectedWinId]   = React.useState(null);
      const [statusMsg,      setStatusMsg]       = React.useState(null);
      const [canvasW,        setCanvasW]         = React.useState(800);
      const [finishLower,    setFinishLower]     = React.useState(DEFAULT_FINISH);
      const [finishUpper,    setFinishUpper]     = React.useState(DEFAULT_FINISH);
      const [finishCol,      setFinishCol]       = React.useState(DEFAULT_FINISH);
      const [customColorLow, setCustomColorLow]  = React.useState('#888888');
      const [customColorUp,  setCustomColorUp]   = React.useState('#888888');
      const [customColorCol, setCustomColorCol]  = React.useState('#888888');
      const [locale,         setLocale]          = React.useState('fr');

      const T = (key, ...args) => {
        let s = (LANG[locale] ?? LANG.fr)[key] ?? LANG.fr[key] ?? key;
        args.forEach((a, i) => { s = s.replace(`{${i}}`, a); });
        return s;
      };

      const svgRef    = React.useRef(null);
      const canvasRef = React.useRef(null);

      // Auto-scale : mesure la largeur du canvas disponible
      React.useEffect(() => {
        if (!canvasRef.current) return;
        const ro = new ResizeObserver(entries => {
          const w = entries[0].contentRect.width;
          setCanvasW(w);
        });
        ro.observe(canvasRef.current);
        return () => ro.disconnect();
      }, []);

      const selLower = cabs.find(c => c.id === selLowerId) ?? null;
      const selUpper = cabs.find(c => c.id === selUpperId) ?? null;
      const cols     = React.useMemo(() => getColPositions(wallLen, colCfg), [wallLen, colCfg]);
      const [cs, ce] = React.useMemo(() => getCabRange(wallLen, colCfg), [wallLen, colCfg]);
      const usedW    = React.useMemo(() => cabs.reduce((a,c) => a+c.w, 0), [cabs]);
      const diff     = usedW - (ce - cs);

      // Dimensions SVG naturelles (2px par cm)
      const svgW = wallLen + C.MARGIN * 2;
      const svgH = C.VIEW_H + C.MARGIN * 2;

      // Scale pour tenir dans le canvas (padding 32px × 2 = 64)
      const availW   = Math.max(200, canvasW - 64);
      const naturalW = svgW * 2;
      const scale    = naturalW > availW ? availW / naturalW : 1;
      const dispW    = Math.round(naturalW * scale);
      const dispH    = Math.round(svgH * 2 * scale);

      const hasColFour = colTypes.some(t => t==='four');
      const hasEvier   = cabs.some(c => EVIER_TYPES.includes(c.lowerType));
      const hasLV      = cabs.some(c => c.lowerType==='lv');
      const hasLl      = cabs.some(c => c.lowerType==='ll');
      const hasHood    = cabs.some(c => c.upperMode==='hood');

      const flash = (type, text) => { setStatusMsg({type, text}); setTimeout(() => setStatusMsg(null), 3000); };

      const regenCabs = (wl, cfg) => {
        setCabs(genCabs(wl, cfg)); setSelLowerId(null); setSelUpperId(null); setExtraCols([]); setSelectedExtraColId(null);
        const n = getColPositions(wl, cfg).length;
        setColTypes(prev => Array.from({length:n},(_,i) => prev[i] ?? 'colonne'));
        setSelectedColIdx(null);
      };

      const updWithReflow = (id, changes) => {
        const idx = cabs.findIndex(c => c.id===id); if (idx===-1) return;
        const [start, end] = getCabRange(wallLen, colCfg);
        const totalZone = (end - start) - extraCols.filter(ec => ec.x >= start && ec.x + ec.w <= end).reduce((s, ec) => s + ec.w, 0);

        // Applique le changement sur le meuble cible
        let newCabs = cabs.map(c => c.id===id ? {...c,...changes} : c);

        if (changes.w !== undefined) {
          let working = [...newCabs];
          const sumAfter = working.reduce((a,c) => a + c.w, 0);
          const targetIsLast = working[working.length - 1].id === id;

          if (targetIsLast && sumAfter < totalZone) {
            // Le meuble réduit est le DERNIER : insérer un ou plusieurs meubles pour combler
            let gap = totalZone - sumAfter;
            while (gap >= 15) {
              const slice = gap >= 60 ? 60 : gap >= 45 ? 45 : gap;
              if (slice < 15) break;
              working.push({
                id: Date.now() + Math.random(),
                x: 0, w: slice,
                lowerType: 'rangement',
                upperMode: 'upper', upperType: 'rangement',
                hoodW: 60, hasPlaque: false,
              });
              gap -= slice;
            }
          } else {
            // Logique existante : le dernier meuble absorbe le delta
            while (working.length > 1) {
              const sumAll = working.reduce((a,c) => a + c.w, 0);
              const lastIdx = working.length - 1;
              const sumBefore = sumAll - working[lastIdx].w;
              const lastW = totalZone - sumBefore;

              if (lastW >= 15) {
                const last = working[lastIdx];
                const lastType = isStdWidth(lastW)
                  ? fixLowerType(last.lowerType, lastW, hasColFour, working, last.id)
                  : 'rangement';
                working[lastIdx] = {...last, w: lastW, lowerType: lastType};
                break;
              } else if (lastW <= 0) {
                working = working.slice(0, lastIdx);
              } else {
                working = working.slice(0, lastIdx);
              }
            }

            if (working.length === 1) {
              const targetW = totalZone;
              const only = working[0];
              const onlyType = isStdWidth(targetW)
                ? fixLowerType(only.lowerType, targetW, hasColFour, working, only.id)
                : 'rangement';
              working[0] = {...only, w: targetW, lowerType: onlyType};
            }
          }

          newCabs = splitOversized(working);
        }

        setCabs(repackCabs(newCabs, start, extraCols));
      };

      const upd = (id, ch) => setCabs(p => p.map(c => c.id===id ? {...c,...ch} : c));

      const swapCab = (id, dir) => {
        const idx = cabs.findIndex(c => c.id === id);
        if (idx === -1) return;
        const targetIdx = idx + dir;
        if (targetIdx < 0 || targetIdx >= cabs.length) return;
        const [start] = getCabRange(wallLen, colCfg);
        const newCabs = [...cabs];
        // Swap uniquement les données, pas les positions x (repackCabs les recalcule)
        const a = { ...newCabs[idx],       w: newCabs[targetIdx].w,
                    lowerType: newCabs[targetIdx].lowerType, upperMode: newCabs[targetIdx].upperMode,
                    upperType: newCabs[targetIdx].upperType, hoodW: newCabs[targetIdx].hoodW,
                    hasPlaque: newCabs[targetIdx].hasPlaque };
        const b = { ...newCabs[targetIdx], w: newCabs[idx].w,
                    lowerType: newCabs[idx].lowerType, upperMode: newCabs[idx].upperMode,
                    upperType: newCabs[idx].upperType, hoodW: newCabs[idx].hoodW,
                    hasPlaque: newCabs[idx].hasPlaque };
        newCabs[idx] = a;
        newCabs[targetIdx] = b;
        setCabs(repackCabs(newCabs, start, extraCols));
      };

      const addWin = () => {
        if (winW < 30) { flash('error', T('flash.winMinWidth')); return; }
        if (winPos + winW > wallLen) { flash('error', T('flash.winOverflow')); return; }
        setWins(p => [...p, {id:winIdCounter, pos:winPos, w:winW}]);
        setWinIdCounter(i => i+1);
        flash('success', T('flash.winAdded'));
      };

      const getSvgCm = clientX => {
        const svg = svgRef.current; if (!svg) return 0;
        const rect = svg.getBoundingClientRect();
        return (clientX - rect.left) * svgW / rect.width - C.MARGIN;
      };
      const clampWinPos = (desired, ww) => {
        const forbidden = [
          ...getColPositions(wallLen, colCfg).map(cX => ({ lo: cX-ww, hi: cX+C.COL_W })),
          ...extraCols.map(ec => ({ lo: ec.x-ww, hi: ec.x+ec.w }))
        ];
        let p = Math.max(0, Math.min(wallLen-ww, desired));
        for (const {lo, hi} of forbidden) {
          if (p > lo && p < hi)
            p = desired <= (lo+hi)/2 ? Math.max(0, lo) : Math.min(wallLen-ww, hi);
        }
        return Math.round(p);
      };
      const onWinDragStart = (winId, winPosNow, e) =>
        setDraggingWin({id:winId, startCm:getSvgCm(e.clientX), startPos:winPosNow});
      const onWinResizeStart = (winId, winWNow, e) => {
        e.stopPropagation();
        setResizingWin({id:winId, startCm:getSvgCm(e.clientX), startW:winWNow});
      };
      const onSvgMouseMove = e => {
        if (draggingWin) {
          const dx = getSvgCm(e.clientX) - draggingWin.startCm;
          const win = wins.find(w => w.id===draggingWin.id); if (!win) return;
          setWins(prev => prev.map(w => w.id===draggingWin.id ? {...w, pos:clampWinPos(draggingWin.startPos+dx, w.w)} : w));
        }
        if (resizingWin) {
          const dx = getSvgCm(e.clientX) - resizingWin.startCm;
          setWins(prev => prev.map(w => {
            if (w.id !== resizingWin.id) return w;
            const newW = Math.max(30, Math.min(wallLen - w.pos, Math.round(resizingWin.startW + dx)));
            return {...w, w: newW};
          }));
        }
      };
      const onSvgMouseUp = () => { setDraggingWin(null); setResizingWin(null); };
      const clearSel = () => { setSelLowerId(null); setSelUpperId(null); setSelectedColIdx(null); };

      const saveDesign = () => {
        try {
          localStorage.setItem('kitchenDesign', JSON.stringify({wallLen,colCfg,colTypes,extraCols,wins,cabs,doorStyle}));
          flash('success', T('flash.saved'));
        } catch(e) { flash('error', T('flash.saveError')); }
      };
      const loadDesign = () => {
        try {
          const saved = localStorage.getItem('kitchenDesign');
          if (!saved) { flash('error', T('flash.loadError')); return; }
          const d = JSON.parse(saved);
          setWallLen(d.wallLen); setColCfg(d.colCfg); setColTypes(d.colTypes); if(d.extraCols) setExtraCols(d.extraCols);
          setWins(d.wins); setCabs(d.cabs); setDoorStyle(d.doorStyle);
          flash('success', T('flash.loaded'));
        } catch(e) { flash('error', T('flash.loadError')); }
      };
      const exportToPng = () => {
        const svgEl = svgRef.current; if (!svgEl) return;
        htmlToImage.toPng(svgEl, { backgroundColor: '#ffffff' })
          .then(dataUrl => {
            const a = document.createElement('a');
            a.download = 'cuisine-elevation.png'; a.href = dataUrl; a.click();
            flash('success', T('flash.exportOk'));
          })
          .catch(err => flash('error', T('flash.exportError')));
      };

      // ── Panneaux ──────────────────────────────────────────────────────
      const LowerPanel = () => {
        if (!selLower) return (
          <div style={{fontSize:'11px',color:'#bbb',textAlign:'center',padding:'14px 0',border:'1px dashed #e8e8e8',marginBottom:'14px',borderRadius:'2px'}}>
            {T('pan.clickEdit')}
          </div>
        );
        const isEvierSel = EVIER_TYPES.includes(selLower.lowerType);
        const isLvSel    = selLower.lowerType==='lv';
        const isLlSel    = selLower.lowerType==='ll';
        return (
          <Sec title={`${T('lower.'+selLower.lowerType)||selLower.lowerType} · x=${selLower.x}cm · ${selLower.w}cm`}>
            <div style={{fontSize:'10px',color:'#999',marginBottom:'5px',letterSpacing:'1px'}}>{T('pan.width').toUpperCase()}</div>
            <div style={{display:'flex',gap:'4px',marginBottom:'10px',flexWrap:'wrap'}}>
              {(() => {
                const typeObj = LOWER_TYPES.find(t => t.id === selLower.lowerType);
                const widths = typeObj?.widths ?? [45, 60, 90];
                return widths.map(w => (
                  <Btn key={w} active={selLower.w===w}
                    onClick={() => updWithReflow(selLower.id,{w, lowerType:fixLowerType(selLower.lowerType,w,hasColFour,cabs,selLower.id)})}>
                    {w}cm
                  </Btn>
                ));
              })()}
            </div>
            <div style={{fontSize:'10px',color:'#999',marginBottom:'5px',letterSpacing:'1px'}}>{T('pan.type').toUpperCase()}</div>
            <div style={{display:'flex',flexDirection:'column',gap:'2px'}}>
              {LOWER_TYPES.filter(t => !t.hidden || selLower.lowerType === t.id).map((t, idx, arr) => {
                const widthIncompat = t.widths && !t.widths.includes(selLower.w);
                const colFourBlock  = t.noColFour && hasColFour;
                const evierDup      = EVIER_TYPES.includes(t.id) && hasEvier && !isEvierSel;
                const isBouteilleSel = selLower.lowerType === 'bouteille';
                const bouteilleCount = cabs.filter(c => c.lowerType === 'bouteille').length;
                const bouteilleFull  = t.id === 'bouteille' && !isBouteilleSel
                                       && t.maxCount && bouteilleCount >= t.maxCount;
                const lvDup         = t.id==='lv' && hasLV && !isLvSel;
                const llDup         = t.id==='ll' && hasLl && !isLlSel;
                const disabled = widthIncompat || colFourBlock || evierDup || lvDup || llDup || bouteilleFull;
                const reason = widthIncompat ? T('err.needsWidth', t.widths?.join(' ou '))
                             : colFourBlock  ? T('err.noColFour')
                             : evierDup      ? T('err.evierDup')
                             : lvDup         ? T('err.lvDup')
                             : llDup         ? T('err.llDup')
                             : bouteilleFull ? T('err.bottleMax', t.maxCount) : '';
                const prevGroup = idx > 0 ? arr[idx-1].group : null;
                const showSep = t.group && t.group !== prevGroup;
                return (
                  <React.Fragment key={t.id}>
                    {showSep && idx > 0 && <div style={{fontSize:'8px',color:'#bbb',letterSpacing:'1.5px',marginTop:'5px',paddingTop:'4px',borderTop:'1px solid #f0f0f0',textTransform:'uppercase'}}>{T('group.'+t.group)}</div>}
                    <Btn active={selLower.lowerType===t.id} disabled={disabled}
                      title={disabled ? reason : ''}
                      onClick={() => {
                        const newType = t.id;
                        const forceW = newType === 'bouteille' ? 15 : undefined;
                        const plaqueMaker = newType === 'four' || newType === 'rang_plaque';
                        const plaqueKiller = EVIER_TYPES.includes(newType) || newType === 'bouteille';
                        const otherHasPlaque = cabs.some(c => c.id !== selLower.id && c.hasPlaque);
                        if (forceW !== undefined) {
                          updWithReflow(selLower.id, { lowerType: newType, w: forceW, hasPlaque: false });
                        } else {
                          setCabs(p => p.map(c => {
                            if (c.id === selLower.id) {
                              const newHasPlaque = plaqueKiller ? false
                                : plaqueMaker && !otherHasPlaque ? true
                                : c.hasPlaque;
                              return {...c, lowerType: newType, hasPlaque: newHasPlaque};
                            }
                            return c;
                          }));
                        }
                      }}
                      style={{textAlign:'left',fontSize:'11px'}}>
                      {T('lower.'+t.id)}{disabled ? ' ⊘' : ''}
                    </Btn>
                  </React.Fragment>
                );
              })}
            </div>

            {/* Plaque de cuisson */}
            {(() => {
              const isEvier = selLower.lowerType === 'evier' || EVIER_TYPES.includes(selLower.lowerType);
              const otherHasPlaque = cabs.some(c => c.id !== selLower.id && c.hasPlaque);
              const tooNarrow = selLower.w < 45;
              const disabled = isEvier || (otherHasPlaque && !selLower.hasPlaque) || tooNarrow;
              const reason = isEvier ? T('err.noEvier')
                           : tooNarrow ? T('err.minWidth45')
                           : (otherHasPlaque && !selLower.hasPlaque) ? T('err.plaqueAlready') : '';
              return (
                <div style={{marginTop:'10px', paddingTop:'10px', borderTop:'1px solid #eee'}}>
                  <div style={{fontSize:'10px',color:'#999',marginBottom:'5px',letterSpacing:'1px'}}>{T('pan.cooktop').toUpperCase()}</div>
                  <Btn
                    active={!!selLower.hasPlaque}
                    disabled={disabled}
                    title={disabled ? reason : ''}
                    style={{width:'100%', textAlign:'center', fontSize:'11px'}}
                    onClick={() => {
                      const newVal = !selLower.hasPlaque;
                      setCabs(p => p.map(c =>
                        newVal
                          ? {...c, hasPlaque: c.id === selLower.id}
                          : c.id === selLower.id ? {...c, hasPlaque: false} : c
                      ));
                    }}>
                    🔥 {selLower.hasPlaque ? T('pan.cookTopOn') : T('pan.addCooktop')}{disabled && !selLower.hasPlaque ? ' ⊘' : ''}
                  </Btn>
                  {disabled && <div style={{fontSize:'10px',color:'#bbb',marginTop:'4px'}}>{reason}</div>}
                </div>
              );
            })()}

            {/* Conversion en colonne */}
            {(() => {
              const [cs, ce] = getCabRange(wallLen, colCfg);
              const fixedCols = getColPositions(wallLen, colCfg);
              // Vérifier si le meuble est adjacent à une colonne (fixe ou ajoutée)
              const cabLeft  = selLower.x;
              const cabRight = selLower.x + selLower.w;
              // Colonnes fixes : positions dans [0,wallLen], x réel = xPos+C.MARGIN
              const isAdjacentToCol = fixedCols.some(cxPos => {
                const colLeft  = cxPos;
                const colRight = cxPos + C.COL_W;
                return Math.abs(cabLeft - colRight) < 2 || Math.abs(cabRight - colLeft) < 2;
              });
              // Vérifier que le meuble haut au-dessus a la même largeur
              const upperMatch = cabs.find(c => c.x === selLower.x && c.w === selLower.w);
              const canConvert = isAdjacentToCol && [30,45,60].includes(selLower.w);
              const blockReason = !isAdjacentToCol ? T('err.adjacentCol')
                                : !canConvert      ? T('err.convertWidth') : '';
              if (!canConvert && !isAdjacentToCol) return null;
              return (
                <div style={{marginTop:'10px',paddingTop:'10px',borderTop:'1px solid #eee'}}>
                  <div style={{fontSize:'10px',color:'#999',marginBottom:'5px',letterSpacing:'1px'}}>{T('pan.convert').toUpperCase()}</div>
                  {canConvert ? (
                    <Btn style={{width:'100%',textAlign:'center'}} onClick={() => {
                      // Supprimer le meuble bas et le meuble haut correspondant
                      // Ajouter une colonne supplémentaire à cette position
                      const newCabs = cabs.filter(c => c.x !== selLower.x || c.w !== selLower.w);
                      // Ajouter la colonne dans colTypes en tant que colonne additionnelle
                      // On stocke les colonnes additionnelles dans un état séparé
                      setExtraCols(prev => [...prev, { x: selLower.x, w: selLower.w, colType: 'colonne', id: Date.now() }]);
                      setCabs(newCabs);
                      setSelLowerId(null);
                    }}>
                      {T('pan.convertBtn')}
                    </Btn>
                  ) : (
                    <div style={{fontSize:'10px',color:'#bbb'}}>{blockReason}</div>
                  )}
                </div>
              );
            })()}
          </Sec>
        );
      };

      const UpperPanel = () => {
        if (!selUpper) return null;
        const isWinZone = hasWinOverlap(selUpper, wins);
        return (
          <Sec title={`${T('upper.'+selUpper.upperType)||''} · x=${selUpper.x}cm · ${selUpper.w}cm`}>
            {isWinZone ? (
              <div style={{fontSize:'11px',color:'#c87000',padding:'6px 8px',border:'1px solid #f0c060',background:'#fffbf0',borderRadius:'2px'}}>
                {T('pan.windowZone')}
              </div>
            ) : (<>
              <div style={{fontSize:'10px',color:'#999',marginBottom:'5px',letterSpacing:'1px'}}>{T('pan.upperElem').toUpperCase()}</div>
              <div style={{display:'flex',gap:'4px',marginBottom:'8px',flexWrap:'wrap'}}>
                <Btn active={selUpper.upperMode==='upper'} onClick={() => upd(selUpper.id,{upperMode:'upper'})}>{T('btn.furniture')}</Btn>
                <Btn active={selUpper.upperMode==='hood'}
                  disabled={selUpper.w<60 || (hasHood && selUpper.upperMode!=='hood')}
                  title={selUpper.w<60 ? T('err.hoodNeeds60') : (hasHood && selUpper.upperMode!=='hood') ? T('err.hoodAlready') : ''}
                  onClick={() => upd(selUpper.id,{upperMode:'hood',hoodW:Math.min(60,selUpper.w)})}>
                  Hotte 🔥
                </Btn>
                <Btn active={selUpper.upperMode==='none'} onClick={() => upd(selUpper.id,{upperMode:'none'})}>{T('btn.none')}</Btn>
              </div>
              {hasHood && selUpper.upperMode!=='hood' && (
                <div style={{fontSize:'10px',color:'#c87000',padding:'5px 6px',border:'1px solid #f0c060',background:'#fffbf0',borderRadius:'2px',marginBottom:'8px'}}>
                  {T('pan.hoodOnce')}
                </div>
              )}
              {selUpper.upperMode==='upper' && (<>
                <div style={{fontSize:'10px',color:'#999',marginBottom:'5px',letterSpacing:'1px'}}>{T('pan.style').toUpperCase()}</div>
                <div style={{display:'flex',flexDirection:'column',gap:'3px',marginBottom:'6px'}}>
                  {UPPER_TYPES.map(t => (
                    <Btn key={t.id} active={selUpper.upperType===t.id}
                      onClick={() => upd(selUpper.id,{upperType:t.id})}
                      style={{textAlign:'left',fontSize:'11px'}}>{T('upper.'+t.id)}</Btn>
                  ))}
                </div>
              </>)}
              {selUpper.upperMode==='hood' && selUpper.w>=60 && (<>
                <div style={{fontSize:'10px',color:'#999',marginBottom:'5px',letterSpacing:'1px'}}>{T('pan.hoodWidth').toUpperCase()}</div>
                <div style={{display:'flex',gap:'4px'}}>
                  {[60,90].filter(hw => hw<=selUpper.w).map(hw => (
                    <Btn key={hw} active={selUpper.hoodW===hw} onClick={() => upd(selUpper.id,{hoodW:hw})}>{hw}cm</Btn>
                  ))}
                </div>
              </>)}
            </>)}
          </Sec>
        );
      };

      // ── Rendu principal ───────────────────────────────────────────────
      const price = calcPrice({ cabs, colCfg, colTypes, extraCols, wallLen, finishLower, finishUpper, finishCol, doorStyle });
      const quoteSummary = buildQuoteSummary({ wallLen, colCfg, colTypes, extraCols, cabs, wins, doorStyle, price, finishLower, finishUpper, finishCol, T, locale });

      return (
        <div style={{fontFamily:'Courier New, monospace',background:'#fff',minHeight:'100vh',color:'#222',display:'flex',flexDirection:'column'}}
          onMouseMove={draggingWin || resizingWin ? onSvgMouseMove : undefined}
          onMouseUp={draggingWin || resizingWin ? onSvgMouseUp : undefined}
          onMouseLeave={draggingWin || resizingWin ? onSvgMouseUp : undefined}>

          {/* Header */}
          <div style={{padding:'10px 20px',borderBottom:'1px solid #e8e8e8',background:'#fff',display:'flex',alignItems:'center',gap:'16px'}}>
<a href={window.REVENDEUR_CONFIG?.siteUrl || 'https://kuchee.com/'} style={{fontSize:'12px',letterSpacing:'3px',color:'#111',fontWeight:'bold',textDecoration:'none',marginRight:'4px'}}>HOME</a>
{window.REVENDEUR_CONFIG?.logoUrl && (
  <img src={window.REVENDEUR_CONFIG.logoUrl} alt={window.REVENDEUR_CONFIG.nomCommercial || ''} style={{height:'28px',maxWidth:'120px',objectFit:'contain',marginLeft:'8px'}} />
)}            <span style={{color:'#ddd',fontSize:'12px'}}>|</span>
            <span style={{fontSize:'14px',letterSpacing:'5px',color:'#111',fontWeight:'bold'}}>{T('hdr.title')}</span>
            <span style={{fontSize:'9px',color:'#bbb',letterSpacing:'2px'}}>{T('hdr.subtitle')}</span>
            {statusMsg && (
              <div style={{marginLeft:'auto',fontSize:'8px',padding:'3px 10px',border:'1px solid',borderRadius:'2px',
                color: statusMsg.type==='success' ? '#1a7a3a' : '#cc2222',
                borderColor: statusMsg.type==='success' ? '#a0d8b0' : '#f0a0a0',
                background: statusMsg.type==='success' ? '#f0fff5' : '#fff5f5'}}>
                {statusMsg.text}
              </div>
            )}
            {/* Sélecteur de langue */}
            <div style={{marginLeft: statusMsg ? '12px' : 'auto', display:'flex', gap:'2px', flexShrink:0}}>
              {['fr','en','it','es','de'].map(l => (
                <button key={l} onClick={() => setLocale(l)}
                  style={{padding:'3px 6px', fontSize:'9px', letterSpacing:'1px',
                    fontFamily:'Courier New,monospace', border:'1px solid',
                    borderRadius:'2px', cursor:'pointer', textTransform:'uppercase',
                    background: locale===l ? '#222' : '#fff',
                    color: locale===l ? '#fff' : '#888',
                    borderColor: locale===l ? '#222' : '#ddd'}}>
                  {l}
                </button>
              ))}
            </div>
          </div>

          <div style={{display:'flex',flex:1,overflow:'hidden'}}>

            {/* ── Sidebar ── */}
            <div style={{width:'260px',flexShrink:0,background:'#fafafa',borderRight:'1px solid #e8e8e8',padding:'14px',overflowY:'auto',display:'flex',flexDirection:'column'}}>

              {/* ── Indicateur 3 étapes ── */}
              <div style={{display:'flex',alignItems:'flex-start',marginBottom:'16px',borderBottom:'2px solid #e8e8e8',paddingBottom:'12px'}}>
                {[
                  { key:'measure', n:'1', label:'Mesures'      },
                  { key:'layout',  n:'2', label:'Implantation' },
                  { key:'finish',  n:'3', label:'Décoration'   },
                ].map(({key, n, label}, i, arr) => {
                  const order  = ['measure','layout','finish'];
                  const cur    = order.indexOf(phase);
                  const me     = order.indexOf(key);
                  const active = phase === key;
                  const done   = cur > me;
                  const canNav = done; // on peut revenir en arrière
                  return (
                    <React.Fragment key={key}>
                      <div style={{flex:1,textAlign:'center',cursor:canNav?'pointer':'default'}}
                        onClick={() => canNav && setPhase(key)}>
                        <div style={{width:'22px',height:'22px',borderRadius:'50%',margin:'0 auto 4px',
                          display:'flex',alignItems:'center',justifyContent:'center',
                          fontSize:'11px',fontWeight:'bold',
                          background: active ? '#222' : done ? '#555' : '#ddd',
                          color:'#fff'}}>
                          {done ? '✓' : n}
                        </div>
                        <div style={{fontSize:'8px',letterSpacing:'1.2px',textTransform:'uppercase',
                          color: active ? '#222' : done ? '#555' : '#bbb'}}>
                          {label}
                        </div>
                      </div>
                      {i < arr.length-1 && (
                        <div style={{display:'flex',alignItems:'center',paddingBottom:'14px'}}>
                          <div style={{width:'18px',height:'1px',
                            background: cur > i ? '#555' : '#ddd'}}/>
                        </div>
                      )}
                    </React.Fragment>
                  );
                })}
              </div>

              {/* ════════════════════════════════
                  ÉTAPE 1 — MESURES & COLONNES
              ════════════════════════════════ */}
              {phase === 'measure' && (<>

                <Sec title={T('sec.wallLen')}>
                  <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                    <input type="range" min={180} max={600} step={1} value={sliderVal}
                      onChange={e => setSliderVal(+e.target.value)}
                      onMouseUp={e => {
                        const snapped = Math.max(180, Math.min(600, Math.round(+e.target.value / 5) * 5));
                        setSliderVal(snapped); setWallLen(snapped); regenCabs(snapped, colCfg);
                      }}
                      onTouchEnd={() => {
                        const snapped = Math.max(180, Math.min(600, Math.round(sliderVal / 5) * 5));
                        setSliderVal(snapped); setWallLen(snapped); regenCabs(snapped, colCfg);
                      }}
                      style={{flex:1}} />
                    <span style={{fontSize:'15px',minWidth:'48px',textAlign:'right',fontWeight:'bold',
                      color: sliderVal !== wallLen ? '#aaa' : 'inherit'}}>
                      {sliderVal}cm
                    </span>
                  </div>
                </Sec>

                {/* Pictos colonnes */}
                <Sec title={T('sec.columns')}>
                  {(() => {
                    const ColPicto = ({ cfg, active, onClick }) => {
                      const W=58, H=38;
                      const floorY = H-4;
                      const cW=13, cTop=2, cH=floorY-cTop;
                      const cabH=11, wtH=2;
                      const cabTop = floorY - cabH;
                      const wtTop  = cabTop - wtH;
                      const cf = active ? '#fff' : '#888';
                      const zf = active ? 'rgba(255,255,255,0.15)' : '#e0e0e0';
                      const wf = active ? '#bbb' : '#aaa';
                      const ff = active ? '#555' : '#ccc';

                      // Positions et zone par config — E=miroir D, B=miroir C, A=D+E
                      const configs = {
                        none: { cols: [],                          zL: 1,        zR: W-1        },
                        D:    { cols: [0],                         zL: cW,       zR: W-1        },
                        E:    { cols: [W-cW],                      zL: 1,        zR: W-cW       },
                        C:    { cols: [0, cW+2],                   zL: cW*2+2,   zR: W-1        },
                        B:    { cols: [W-cW*2-2, W-cW],            zL: 1,        zR: W-cW*2-2   },
                        A:    { cols: [0, W-cW],                   zL: cW,       zR: W-cW       },
                      };
                      const { cols: colXs, zL, zR } = configs[cfg] || configs.none;

                      return (
                        <div onClick={onClick} style={{cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:'3px'}}>
                          <svg width={W} height={H} style={{borderRadius:'3px',display:'block',
                            background: active ? '#222' : '#f2f2f2',
                            border: `2px solid ${active ? '#222' : '#ddd'}`,
                            transition:'all 0.12s'}}>
                            {/* Sol */}
                            <rect x={0} y={floorY} width={W} height={H-floorY} fill={ff}/>
                            {/* Colonnes */}
                            {colXs.map((cx, i) => (
                              <rect key={i} x={cx} y={cTop} width={cW} height={cH} rx={1} fill={cf}/>
                            ))}
                            {/* Zone meubles + plan de travail */}
                            {zR > zL && <>
                              <rect x={zL} y={cabTop} width={zR-zL} height={cabH} fill={zf} rx={0.5}/>
                              <rect x={zL} y={wtTop}  width={zR-zL} height={wtH}  fill={wf} rx={0.5}/>
                            </>}
                          </svg>
                          <span style={{fontSize:'8px',letterSpacing:'1px',textTransform:'uppercase',
                            color: active ? '#222' : '#aaa'}}>
                            {cfg==='none' ? T('col.noneShort') : T('col.'+cfg+'short')}
                          </span>
                        </div>
                      );
                    };
                    return (
                      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'6px',marginBottom:'4px'}}>
                        {['none','A','B','C','D','E'].map(c => (
                          <ColPicto key={c} cfg={c} active={colCfg===c}
                            onClick={() => { setColCfg(c); regenCabs(wallLen,c); setSelectedColIdx(null); }}/>
                        ))}
                      </div>
                    );
                  })()}
                </Sec>

                {/* Fenêtres */}
                <Sec title={T('sec.windows')}>
                  {wins.map(w => {
                    const isSel = selectedWinId === w.id;
                    return (
                      <div key={w.id}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',
                          fontSize:'12px',marginBottom:'4px',
                          color: isSel ? '#1a56cc' : '#3366cc',
                          cursor:'pointer',
                          padding:'3px 5px',
                          background: isSel ? '#f0f4ff' : 'transparent',
                          border: isSel ? '1px solid #c0d0ff' : '1px solid transparent',
                          borderRadius:'2px'}}
                          onClick={() => {
                            if (isSel) { setSelectedWinId(null); }
                            else { setSelectedWinId(w.id); setWinPos(w.pos); setWinW(w.w); }
                          }}>
                          <span>⊞ {w.pos}cm + {w.w}cm</span>
                          <button onClick={e => { e.stopPropagation(); setWins(p => p.filter(x => x.id!==w.id)); if(isSel) setSelectedWinId(null); }}
                            style={{background:'none',border:'none',color:'#cc3333',cursor:'pointer',fontSize:'14px',padding:'0 2px',lineHeight:1}}>×</button>
                        </div>
                        {isSel && (
                          <div style={{display:'flex',gap:'6px',marginBottom:'6px',padding:'6px',background:'#f7f9ff',border:'1px solid #dde4ff',borderRadius:'2px'}}>
                            <div style={{flex:1}}>
                              <div style={{fontSize:'9px',color:'#999',marginBottom:'3px'}}>← DEPUIS GAUCHE</div>
                              <input type="number" value={w.pos}
                                onChange={e => setWins(p => p.map(x => x.id===w.id ? {...x, pos:+e.target.value} : x))}
                                onBlur={e => setWins(p => p.map(x => x.id===w.id ? {...x, pos:Math.max(0, Math.min(wallLen-x.w, +e.target.value))} : x))}
                                style={{width:'100%',background:'#f7f7f7',border:'1px solid #ccc',color:'#222',padding:'3px 6px',fontSize:'10px',fontFamily:'Courier New,monospace'}}/>
                            </div>
                            <div style={{flex:1}}>
                              <div style={{fontSize:'9px',color:'#999',marginBottom:'3px'}}>↔ LARGEUR</div>
                              <input type="number" value={w.w}
                                onChange={e => setWins(p => p.map(x => x.id===w.id ? {...x, w:+e.target.value} : x))}
                                onBlur={e => setWins(p => p.map(x => x.id===w.id ? {...x, w:Math.max(30, Math.min(wallLen-x.pos, +e.target.value))} : x))}
                                style={{width:'100%',background:'#f7f7f7',border:'1px solid #ccc',color:'#222',padding:'3px 6px',fontSize:'10px',fontFamily:'Courier New,monospace'}}/>
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                  <div style={{fontSize:'10px',color:'#bbb',marginBottom:'6px'}}>{T('win.drag')}</div>
                  <div style={{display:'flex',gap:'6px',marginBottom:'6px'}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:'10px',color:'#999',marginBottom:'3px'}}>← DEPUIS GAUCHE</div>
                      <input type="number" value={winPos}
                        onChange={e => setWinPos(+e.target.value)}
                        onBlur={e => setWinPos(Math.max(0, Math.min(wallLen-winW, +e.target.value)))} />
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:'10px',color:'#999',marginBottom:'3px'}}>↔ LARGEUR</div>
                      <input type="number" value={winW}
                        onChange={e => setWinW(+e.target.value)}
                        onBlur={e => setWinW(Math.max(30, Math.min(wallLen-winPos, +e.target.value)))} />
                    </div>
                  </div>
                  <Btn onClick={addWin} style={{width:'100%',textAlign:'center'}}>{T('win.addBtn')}</Btn>
                </Sec>

              </>)}

              {/* ════════════════════════════════
                  ÉTAPE 2 — IMPLANTATION
              ════════════════════════════════ */}
              {phase === 'layout' && (<>

                {/* Type de colonne fixe */}
                {selectedColIdx!==null && colCfg!=='none' && cols.length>0 && (
                  <Sec title={`Col.${selectedColIdx+1} — ${cols[selectedColIdx]}cm`}>
                    <div style={{display:'flex',flexDirection:'column',gap:'3px',marginBottom:'8px'}}>
                      {COL_TYPES.map(t => {
                        const isLeftExtreme  = (colCfg==='A' && selectedColIdx===0)||(colCfg==='C' && selectedColIdx===0)||colCfg==='D';
                        const isRightExtreme = (colCfg==='A' && selectedColIdx===cols.length-1)||(colCfg==='B' && selectedColIdx===cols.length-1)||colCfg==='E';
                        const disabled = t.id==='frigo_libre' && !(isLeftExtreme||isRightExtreme);
                        return (
                          <Btn key={t.id} active={(colTypes[selectedColIdx]||'colonne')===t.id}
                            disabled={disabled} title={disabled?T('err.notExtreme'):''}
                            onClick={() => !disabled && setColTypes(prev => { const a=[...prev]; a[selectedColIdx]=t.id; return a; })}
                            style={{textAlign:'left',fontSize:'11px'}}>
                            {t.id==='colonne'?'◼ ':t.id==='frigo'?'❄ ':'🔥 '}{t.label}
                          </Btn>
                        );
                      })}
                    </div>
                    {hasColFour && <div style={{fontSize:'10px',color:'#c87000',padding:'5px 6px',border:'1px solid #f0c060',background:'#fffbf0',borderRadius:'2px',marginBottom:'6px'}}>{T('pan.fourDisabled')}</div>}
                    <Btn onClick={() => setSelectedColIdx(null)} style={{fontSize:'8px',width:'100%',textAlign:'center'}}>{T('btn.back')}</Btn>
                  </Sec>
                )}

                {selectedColIdx===null && (selectedExtraColId !== null && extraCols.find(c=>c.id===selectedExtraColId) ? (() => {
                  const ec = extraCols.find(c=>c.id===selectedExtraColId);
                  return (
                    <Sec title={`${T('sec.extraCol')} · ${ec.w}cm`}>
                      <div style={{fontSize:'10px',color:'#999',marginBottom:'5px',letterSpacing:'1px'}}>{T('pan.width').toUpperCase()}</div>
                      <div style={{display:'flex',gap:'4px',marginBottom:'10px'}}>
                        {[30,45,60].map(sz => (
                          <Btn key={sz} active={ec.w===sz}
                            onClick={() => {
                              const oldW = ec.w, diff = sz - oldW;
                              if (diff === 0) return;
                              const [cabStart, cabEnd] = getCabRange(wallLen, colCfg);
                              const newColType = ec.colType==='four' && sz!==60 ? 'colonne' : ec.colType;
                              const colRight = ec.x + oldW;
                              const rightAdj = cabs.find(c => Math.abs(c.x - colRight) < 2);
                              if (rightAdj) {
                                // Colonne gauche ou milieu : le meuble droit absorbe le delta
                                const updatedExtraCols = extraCols.map(c => c.id===ec.id ? {...c, w:sz, colType:newColType} : c);
                                setExtraCols(updatedExtraCols);
                                setCabs(prev => {
                                  const sorted = [...prev].sort((a,b)=>a.x-b.x);
                                  const adjIdx = sorted.findIndex(c => c.id === rightAdj.id);
                                  if (adjIdx >= 0) {
                                    const adj = sorted[adjIdx], newW = adj.w - diff;
                                    if (newW >= 20) sorted[adjIdx] = {...adj, x: adj.x + diff, w: newW};
                                  }
                                  return sorted;
                                });
                              } else {
                                // Colonne en bout droit : glisser la colonne vers la droite
                                // et élargir le dernier meuble bas pour combler le gap
                                const newX = cabEnd - sz;
                                const updatedExtraCols = extraCols.map(c => c.id===ec.id ? {...c, w:sz, x:newX, colType:newColType} : c);
                                setExtraCols(updatedExtraCols);
                                setCabs(prev => {
                                  const sorted = [...prev].sort((a,b)=>a.x-b.x);
                                  if (sorted.length > 0) {
                                    const li = sorted.length - 1;
                                    sorted[li] = {...sorted[li], w: sorted[li].w + (oldW - sz)};
                                  }
                                  return repackCabs(sorted, cabStart, updatedExtraCols);
                                });
                              }
                            }}>
                            {sz}cm
                          </Btn>
                        ))}
                      </div>
                      <div style={{fontSize:'10px',color:'#999',marginBottom:'5px',letterSpacing:'1px'}}>{T('pan.type').toUpperCase()}</div>
                      <div style={{display:'flex',gap:'4px',marginBottom:'10px'}}>
                        <Btn active={ec.colType!=='four'}
                          onClick={() => setExtraCols(prev => prev.map(c => c.id===ec.id ? {...c, colType:'colonne'} : c))}>
                          {T('pan.storage')}
                        </Btn>
                        <Btn active={ec.colType==='four'} disabled={ec.w!==60}
                          title={ec.w!==60 ? T('err.needs60') : ''}
                          onClick={() => ec.w===60 && setExtraCols(prev => prev.map(c => c.id===ec.id ? {...c, colType:'four'} : c))}>
                          {T('pan.oven')} {ec.w!==60 ? '⊘' : ''}
                        </Btn>
                      </div>
                      <Btn style={{width:'100%',textAlign:'center'}}
                        onClick={() => {
                          setExtraCols(prev => prev.filter(c => c.id !== ec.id));
                          setCabs(prev => {
                            const newCab = {id: Date.now(), x: ec.x, w: ec.w, lowerType:'rangement', upperMode:'upper', upperType:'rangement', hoodW:60};
                            return [...prev, newCab].sort((a,b)=>a.x-b.x);
                          });
                          setSelectedExtraColId(null);
                        }}>
                        🗑 {T('pan.deleteCol')}
                      </Btn>
                    </Sec>
                  );
                })() : selUpperId!==null ? <UpperPanel /> : <LowerPanel />)}

              </>)}

              {/* ════════════════════════════════
                  ÉTAPE 3 — DÉCORATION
              ════════════════════════════════ */}
              {phase === 'finish' && (<>

                <div style={{marginBottom:'14px',padding:'12px',background:'#f9f9f9',border:'1px solid #e8e8e8'}}>
                  <div style={{fontSize:'9px',letterSpacing:'2px',color:'#888',marginBottom:'12px',textTransform:'uppercase',borderBottom:'1px solid #e8e8e8',paddingBottom:'6px'}}>
                    {T('sec.finishes')}
                  </div>
                  <FinishPicker label={T('bud.lower')} T={T} finish={finishLower} onSelect={setFinishLower} customColor={customColorLow} onCustomColor={setCustomColorLow}/>
                  <FinishPicker label={T('bud.upper')} T={T} finish={finishUpper} onSelect={setFinishUpper} customColor={customColorUp} onCustomColor={setCustomColorUp}/>
                  <FinishPicker label={T('bud.cols')}  T={T} finish={finishCol}   onSelect={setFinishCol}   customColor={customColorCol} onCustomColor={setCustomColorCol}/>
                </div>

                {(cabs.length > 0 || extraCols.length > 0 || colCfg !== 'none') && (() => {
                  const hasFrigoLibre = colTypes.some(t=>t==='frigo_libre')||extraCols.some(ec=>ec.colType==='frigo_libre');
                  const needsElec = hasFrigoLibre || hasLV || hasLl;
                  return (
                    <div style={{marginBottom:'14px',padding:'12px',background:'#f9f9f9',border:'1px solid #e8e8e8',borderRadius:'2px'}}>
                      <div style={{fontSize:'9px',letterSpacing:'2px',color:'#888',marginBottom:'10px',textTransform:'uppercase',borderBottom:'1px solid #e8e8e8',paddingBottom:'6px'}}>
                        {T('sec.budget')}
                      </div>
                      {[
                        [T('bud.lower'), fmt(price.lower, locale), null],
                        [T('bud.upper'), fmt(price.upper, locale), null],
                        price.cols > 0 ? [T('bud.cols'), fmt(price.cols, locale), null] : null,
                        [T('bud.worktop'), fmt(price.worktop, locale), null],
                      ].filter(Boolean).map(([label, lo, hi]) => (
                        <div key={label} style={{display:'flex',justifyContent:'space-between',fontSize:'10px',marginBottom:'4px',color:'#555'}}>
                          <span>{label}</span>
                          <span style={{fontWeight:'500',color:'#333'}}>{hi ? `${lo} – ${hi}` : lo}</span>
                        </div>
                      ))}
                      <div style={{borderTop:'1px solid #ddd',marginTop:'8px',paddingTop:'8px',display:'flex',justifyContent:'space-between',alignItems:'baseline'}}>
                        <span style={{fontSize:'9px',letterSpacing:'1px',color:'#888',textTransform:'uppercase'}}>{T('bud.totalHT')}</span>
                        <span style={{fontSize:'13px',fontWeight:'bold',color:'#111',letterSpacing:'-0.5px'}}>{fmt(price.total, locale)}</span>
                      </div>
                      <div style={{fontSize:'8.5px',color:'#bbb',marginTop:'5px',lineHeight:'1.5'}}>{T('bud.delivery')}</div>
                      {needsElec && (
                        <div style={{fontSize:'8.5px',color:'#c07000',marginTop:'4px',lineHeight:'1.5',borderTop:'1px solid #f0e0c0',paddingTop:'4px'}}>
                          {T('bud.elec')}{hasFrigoLibre?' ('+T('col.frigo_libre').split(' ')[0]+')':''}{hasLV?' ('+T('lower.lv')+')':''}{hasLl?' ('+T('lower.ll')+')':''}
                        </div>
                      )}
                    </div>
                  );
                })()}

              </>)}

              {/* ── Bouton de progression en bas ── */}
              <div style={{marginTop:'auto',paddingTop:'10px',borderTop:'1px solid #e8e8e8'}}>
                {phase === 'measure' && (
                  <Btn onClick={() => setPhase('layout')} style={{width:'100%',padding:'12px',textAlign:'center',letterSpacing:'1px',fontSize:'10px',background:'#222',color:'#fff',border:'1px solid #222'}}>
                    J'IMPLANTE MES MEUBLES →
                  </Btn>
                )}
                {phase === 'layout' && (
                  <Btn onClick={() => setPhase('finish')} style={{width:'100%',padding:'12px',textAlign:'center',letterSpacing:'1px',fontSize:'10px',background:'#222',color:'#fff',border:'1px solid #222'}}>
                    {T('act.validate')}
                  </Btn>
                )}
                {phase === 'finish' && (<>
                  <div style={{fontSize:'10px',color:'#999',marginBottom:'8px',letterSpacing:'2px'}}>{T('sec.doorStyle').toUpperCase()}</div>
                  <div style={{display:'flex',gap:'4px',marginBottom:'10px'}}>
                    <Btn active={doorStyle==='smooth'} onClick={() => setDoorStyle('smooth')}>{T('door.smooth')}</Btn>
                    <Btn active={doorStyle==='frame'}  onClick={() => setDoorStyle('frame')}>{T('door.frame')}</Btn>
                  </div>
                  <div style={{display:'flex',gap:'4px',marginBottom:'8px'}}>
                    <Btn onClick={saveDesign}  style={{flex:1,textAlign:'center',fontSize:'11px'}}>💾</Btn>
                    <Btn onClick={loadDesign}  style={{flex:1,textAlign:'center',fontSize:'11px'}}>📂</Btn>
                    <Btn onClick={exportToPng} style={{flex:1,textAlign:'center',fontSize:'11px'}}>📷 PNG</Btn>
                  </div>
                  <button onClick={() => setShowLeadModal(true)}
                    style={{width:'100%',padding:'12px',background:'#222',color:'#fff',border:'none',cursor:'pointer',fontFamily:'Courier New,monospace',fontSize:'10px',letterSpacing:'2px',textAlign:'center'}}>
                    {T('act.sendQuote')}
                  </button>
                </>)}
              </div>

            </div>

            {/* ── Canvas SVG ── */}
            <div ref={canvasRef}
              style={{flex:1,background:'#f2f2f2',padding:'32px',overflowX:'auto',overflowY:'auto',display:'flex',flexDirection:'column',alignItems:'flex-start'}}
              onClick={clearSel}>
              <div style={{background:'white',boxShadow:'0 2px 24px rgba(0,0,0,0.10)',display:'inline-block',border:'1px solid #e8e8e8'}}
                onClick={e => e.stopPropagation()}>
                {/* Barre titre du plan */}
                <div style={{padding:'7px 14px',background:'#f9f9f9',borderBottom:'1px solid #e8e8e8',display:'flex',justifyContent:'space-between',fontSize:'7.5px',color:'#999',fontFamily:'monospace'}}>
                  <span>{T('svg.elevation')} — L={wallLen}cm{colCfg!=='none'?` · COL.${colCfg}`:''}</span>
                  <span>{T('svg.dims')}</span>
                </div>

                <svg ref={svgRef}
                  viewBox={`0 0 ${svgW} ${svgH}`}
                  width={dispW} height={dispH}
                  xmlns="http://www.w3.org/2000/svg"
                  style={{display:'block',cursor:draggingWin?'grabbing':'default',userSelect:'none'}}
                  onMouseMove={onSvgMouseMove} onMouseUp={onSvgMouseUp} onMouseLeave={onSvgMouseUp}>

                  {/* Patterns bois */}
                  <defs>
                    {FINISHES.bois.map(f => (
                      <pattern key={f.id} id={`pat-${f.id}`} x="0" y="0" width="18" height="300" patternUnits="userSpaceOnUse">
                        <rect width="18" height="300" fill={f.hex}/>
                        <rect x="0"  width="1.2" height="300" fill={f.darkHex} opacity="0.7"/>
                        <rect x="4"  width="0.7" height="300" fill={f.lightHex} opacity="0.6"/>
                        <rect x="7"  width="1.5" height="300" fill={f.darkHex} opacity="0.5"/>
                        <rect x="11" width="0.8" height="300" fill={f.lightHex} opacity="0.55"/>
                        <rect x="15" width="1.0" height="300" fill={f.darkHex} opacity="0.45"/>
                      </pattern>
                    ))}
                  </defs>

                  {/* Grille légère */}
                  <g>
                    {Array.from({length:Math.ceil(svgW/10)+1},(_,i) =>
                      <line key={`v${i}`} x1={i*10} y1={0} x2={i*10} y2={svgH} stroke="#f0f0f0" strokeWidth={0.3} />)}
                    {Array.from({length:Math.ceil(svgH/10)+1},(_,i) =>
                      <line key={`h${i}`} x1={0} y1={i*10} x2={svgW} y2={i*10} stroke="#f0f0f0" strokeWidth={0.3} />)}
                  </g>

                  {/* Mur */}
                  <g>
                    <rect x={C.MARGIN} y={COL_TOP_Y} width={wallLen} height={C.COL_H} fill="#fafafa" />
                    <line x1={C.MARGIN} y1={COL_TOP_Y} x2={C.MARGIN} y2={FLOOR_Y} stroke="#555" strokeWidth={0.8} />
                    <line x1={C.MARGIN+wallLen} y1={COL_TOP_Y} x2={C.MARGIN+wallLen} y2={FLOOR_Y} stroke="#555" strokeWidth={0.8} />
                    <line x1={C.MARGIN} y1={FLOOR_Y} x2={C.MARGIN+wallLen} y2={FLOOR_Y} stroke="#222" strokeWidth={2.5} />
                  </g>

                  {/* Colonnes additionnelles */}
                  <g>{extraCols.map(ec => {
                    const x = C.MARGIN + ec.x, y = COL_TOP_Y, w = ec.w;
                    const h = C.COL_H - C.PLINTH_H;
                    const plinthY = svgY(C.PLINTH_H);
                    const clipId = `extracol${ec.id}`;
                    const isSel = selectedExtraColId === ec.id;
                    return (
                      <g key={ec.id} onClick={e => { e.stopPropagation(); setSelectedExtraColId(prev => prev===ec.id ? null : ec.id); setSelLowerId(null); setSelUpperId(null); setSelectedColIdx(null); }} style={{cursor:'pointer'}}>
                        <defs><clipPath id={clipId}><rect x={x} y={y} width={w} height={h}/></clipPath></defs>
                        <rect x={x} y={y} width={w} height={h} fill={getFacadeFill(finishCol)}
                          stroke={isSel ? '#1a56cc' : '#333'} strokeWidth={isSel ? 2 : 1.5}/>
                        <rect x={x} y={plinthY} width={w} height={C.PLINTH_H}
                          fill={getFacadeFill(finishCol)} stroke="#555" strokeWidth={0.8}/>
                        {ec.colType==='four' && ec.w===60
                          ? <InlineFourColonne x={x} y={y} w={w} h={h}/>
                          : ec.colType==='frigo' || ec.colType==='frigo_libre'
                          ? <InlineFrigo x={x} y={y} w={w} h={h}/>
                          : <InlineColonne x={x} y={y} w={w} h={h}/>}
                      </g>
                    );
                  })}</g>

                  {/* Fenêtres */}
                  <g>{wins.map(w => <WinSvg key={w.id} win={w}
                    onDragStart={onWinDragStart}
                    onResizeStart={onWinResizeStart}
                    onSelect={id => setSelectedWinId(prev => prev===id ? null : id)}
                    isDragging={draggingWin?.id===w.id}
                    isResizing={resizingWin?.id===w.id}
                    isSelected={selectedWinId===w.id} />)}</g>

                  {/* Colonnes */}
                  <g>{cols.map((cx,i) => {
                    const isLeft = (colCfg==='A' && i===0) || colCfg==='C' || colCfg==='D';
                    return <ColSvg key={i} xPos={cx} doorStyle={doorStyle} idx={i} isLeft={isLeft}
                      colType={colTypes[i]} selected={selectedColIdx===i}
                      colFill={getFacadeFill(finishCol)}
                      onClick={e => { e.stopPropagation(); setSelectedColIdx(prev=>prev===i?null:i); setSelLowerId(null); setSelUpperId(null); setSelectedExtraColId(null); }} />;
                  })}</g>

                  {/* Meubles hauts */}
                  <g>{cabs.map(c => <UpperSvg key={c.id} cab={c} doorStyle={doorStyle} wins={wins}
                    selected={selUpperId===c.id}
                    facadeFill={getFacadeFill(finishUpper)}
                    onSelect={() => { setSelUpperId(prev=>prev===c.id?null:c.id); setSelLowerId(null); setSelectedColIdx(null); setSelectedExtraColId(null); }} />)}</g>

                  {/* Meubles bas */}
                  <g>{cabs.map((c, idx) => {
                    const isLowerSel = selLowerId===c.id;
                    return <LowerSvg key={c.id} cab={c} selected={isLowerSel}
                      onSelect={() => { setSelLowerId(prev=>prev===c.id?null:c.id); setSelUpperId(null); setSelectedColIdx(null); setSelectedExtraColId(null); }}
                      doorStyle={doorStyle} facadeFill={getFacadeFill(finishLower)}
                      canSwapLeft={isLowerSel && idx > 0}
                      canSwapRight={isLowerSel && idx < cabs.length-1}
                      onSwapLeft={() => swapCab(c.id, -1)}
                      onSwapRight={() => swapCab(c.id, +1)} />;
                  })}</g>

                  {/* Plinthe — passe unique sur toute la rangée */}
                  {(() => {
                    const [ps, pe] = getCabRange(wallLen, colCfg);
                    if (pe <= ps) return null;
                    return <rect
                      x={C.MARGIN + ps}
                      y={svgY(C.PLINTH_H)}
                      width={pe - ps}
                      height={C.PLINTH_H}
                      rx={0.5}
                      fill="#e8e8e8"
                      stroke="#555"
                      strokeWidth={0.8}
                    />;
                  })()}



                  {/* Cotations */}
                  <g>
                    <line x1={C.MARGIN} y1={svgY(C.LOWER_H+C.COUNTER_H)} x2={C.MARGIN+wallLen} y2={svgY(C.LOWER_H+C.COUNTER_H)} stroke="#ccc" strokeWidth={0.5} strokeDasharray="4,3" />
                    <line x1={C.MARGIN} y1={svgH-8} x2={C.MARGIN+wallLen} y2={svgH-8} stroke="#888" strokeWidth={0.7} />
                    <line x1={C.MARGIN} y1={svgH-12} x2={C.MARGIN} y2={svgH-4} stroke="#888" strokeWidth={0.7} />
                    <line x1={C.MARGIN+wallLen} y1={svgH-12} x2={C.MARGIN+wallLen} y2={svgH-4} stroke="#888" strokeWidth={0.7} />
                    <text x={C.MARGIN+wallLen/2} y={svgH-1} textAnchor="middle" fontSize={7.5} fill="#555" fontFamily="Courier New, monospace">{wallLen} cm</text>
                    <line x1={6} y1={FLOOR_Y} x2={6} y2={COL_TOP_Y} stroke="#ccc" strokeWidth={0.5} />
                    <line x1={3} y1={FLOOR_Y} x2={9} y2={FLOOR_Y} stroke="#ccc" strokeWidth={0.5} />
                    <line x1={3} y1={COL_TOP_Y} x2={9} y2={COL_TOP_Y} stroke="#ccc" strokeWidth={0.5} />
                    <text x={4} y={(FLOOR_Y+COL_TOP_Y)/2} textAnchor="middle" fontSize={6.5} fill="#888" fontFamily="monospace"
                      transform={`rotate(-90,4,${(FLOOR_Y+COL_TOP_Y)/2})`}>{C.COL_H} cm</text>
                  </g>
                </svg>
              </div>

              {/* Légende */}
              <div style={{display:'flex',gap:'16px',marginTop:'12px',fontSize:'11px',color:'#999',flexWrap:'wrap'}}>
                <span>◻ {T('leg.lower')}</span>
                <span>▦ {T('leg.upper')}</span>
                <span>▽ {T('leg.hood')}</span>
                <span>⊞ {T('leg.window')}</span>
                <span>◼ {T('leg.col')}</span>
                {Math.abs(diff)<=0.5 && cabs.length>0 && <span style={{color:'#1a7a3a',fontWeight:'bold'}}>{T('leg.ok')} · {wallLen}cm</span>}
              </div>
            </div>
          </div>

          {/* ── Modal Lead ── */}
          {showLeadModal && (
            <LeadModal
              onClose={() => setShowLeadModal(false)}
              quoteSummary={quoteSummary}
              svgRef={svgRef}
              T={T}
            />
          )}

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<KitchenDesigner />);
  </script>
</body>
</html>
